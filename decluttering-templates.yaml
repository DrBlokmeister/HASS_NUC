###############################
## DISK HEALTH TEMPLATE CARD ##
###############################
tower_disk_health_card:
  default:
    - icon: mdi:harddisk
  card:
    type: custom:mushroom-template-card
    entity: binary_sensor.tower_disk_[[disk_key]]_health
    primary: '[[disk_title]] health'
    secondary: >-
      {% set entity_id = 'binary_sensor.tower_disk_[[disk_key]]_health' %}
      {% set temp = state_attr(entity_id, 'temperature') %}
      {% set spinning = state_attr(entity_id, 'spinning') %}
      {% if is_state(entity_id, 'on') %}
        Problem · {{ temp }} °C · {{ 'spinning' if spinning else 'standby' }}
      {% elif is_state(entity_id, 'unavailable') %}
        Unavailable
      {% else %}
        OK · {{ temp }} °C · {{ 'spinning' if spinning else 'standby' }}
      {% endif %}
    icon: '[[icon]]'
    icon_color: >-
      {% set entity_id = 'binary_sensor.tower_disk_[[disk_key]]_health' %}
      {% if is_state(entity_id, 'on') %}
        red
      {% elif is_state(entity_id, 'unavailable') %}
        gray
      {% else %}
        green
      {% endif %}
    fill_container: true
    multiline_secondary: true

##############################
## DISK USAGE MUSHROOM CARD ##
##############################
disk_usage_mushroom_card:
  card:
    type: custom:mushroom-template-card
    entity: '[[usage_entity]]'
    primary: '[[name]]'
    secondary: >-
      {%- set usage_entity = '[[usage_entity]]' -%}
      {%- set health_entity = '[[health_entity]]' -%}
      {%- set s = states(usage_entity) -%}
      {%- set health_state = states(health_entity) -%}
      {%- set spinning = state_attr(health_entity, 'spinning') -%}
      {%- set health_temp = state_attr(health_entity, 'temperature') -%}
      {%- set sensor_temp = states('[[temp_entity]]') -%}
      {%- set temp = health_temp if health_temp not in [none, 'unknown', 'unavailable', 'none', 'None', ''] else sensor_temp -%}
      {%- set used = state_attr(usage_entity, 'used') -%}
      {%- set total = state_attr(usage_entity, 'total') -%}
      {%- set usage_ok = s not in ['unknown', 'unavailable', 'none', 'None', ''] -%}
      {%- set has_size = used not in [none, 'unknown', 'unavailable', 'none', 'None', ''] and total not in [none, 'unknown', 'unavailable', 'none', 'None', ''] -%}
      {%- if health_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
        Unavailable
      {%- elif is_state(health_entity, 'on') -%}
        Problem · {{ temp if temp not in ['unknown', 'unavailable', 'none', 'None', ''] else '—' }} °C{{ '\n' }}{{ 'spinning' if spinning else 'standby' }}
      {%- elif usage_ok -%}
        {{ temp if temp not in ['unknown', 'unavailable', 'none', 'None', ''] else '—' }} °C · {{ s | float(0) | round(1) }}%{{ '\n' }}{{ used }} / {{ total }}
      {%- elif has_size -%}
        {{ temp if temp not in ['unknown', 'unavailable', 'none', 'None', ''] else '—' }} °C · {{ 'spinning' if spinning else 'standby' }}{{ '\n' }}{{ used }} / {{ total }}
      {%- else -%}
        {{ temp if temp not in ['unknown', 'unavailable', 'none', 'None', ''] else '—' }} °C · {{ 'spinning' if spinning else 'standby' }}{{ '\n' }}Usage unavailable
      {%- endif -%}
    icon: '[[icon]]'
    icon_color: >-
      {%- set usage_entity = '[[usage_entity]]' -%}
      {%- set health_entity = '[[health_entity]]' -%}
      {%- set s = states(usage_entity) -%}
      {%- set health_state = states(health_entity) -%}
      {%- if health_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
        disabled
      {%- elif is_state(health_entity, 'on') -%}
        red
      {%- elif s not in ['unknown', 'unavailable', 'none', 'None', ''] and s | float(0) >= 90 -%}
        red
      {%- elif s not in ['unknown', 'unavailable', 'none', 'None', ''] and s | float(0) >= 80 -%}
        amber
      {%- else -%}
        [[ok_color]]
      {%- endif -%}
    multiline_secondary: true
    #fill_container: false
    tap_action:
      action: more-info

##################################
## CONTAINER STATUS BUTTON CARD ##
##################################
container_status_button:
  card:
    type: custom:button-card
    entity: '[[entity]]'
    name: '[[name]]'
    show_icon: false
    show_state: true
    state_display: >
      [[[
        return entity?.attributes?.status || (entity?.state === 'on' ? 'RUNNING' : 'EXITED');
      ]]]
    custom_fields:
      logo: >
        [[[
          const url = entity?.attributes?.icon_url;
          return url
            ? `<img src="${url}" style="width:28px;height:28px;object-fit:contain;border-radius:6px;">`
            : `<ha-icon icon="[[fallback_icon]]" style="width:28px;height:28px;"></ha-icon>`;
        ]]]
    styles:
      grid:
        - grid-template-areas: '"logo" "n" "s"'
        - grid-template-columns: 1fr
        - grid-template-rows: 36px min-content min-content
      card:
        - padding: 10px
        - background-color: >
            [[[
              const status = String(entity?.attributes?.status || (entity?.state === 'on' ? 'RUNNING' : 'EXITED')).toUpperCase();
              if (status === 'RUNNING') return 'rgba(46, 125, 50, 0.28)';
              if (status === 'EXITED') return 'rgba(120, 120, 120, 0.22)';
              if (status === 'PAUSED') return 'rgba(251, 192, 45, 0.28)';
              if (['ERROR', 'FAILED', 'DEAD'].includes(status)) return 'rgba(211, 47, 47, 0.28)';
              return 'rgba(120, 120, 120, 0.18)';
            ]]]
        - border: >
            [[[
              const status = String(entity?.attributes?.status || (entity?.state === 'on' ? 'RUNNING' : 'EXITED')).toUpperCase();
              if (status === 'RUNNING') return '1px solid rgba(46, 125, 50, 0.45)';
              if (status === 'EXITED') return '1px solid rgba(158, 158, 158, 0.35)';
              if (status === 'PAUSED') return '1px solid rgba(251, 192, 45, 0.45)';
              if (['ERROR', 'FAILED', 'DEAD'].includes(status)) return '1px solid rgba(211, 47, 47, 0.45)';
              return '1px solid rgba(158, 158, 158, 0.25)';
            ]]]
      name:
        - font-size: 0.85em
      state:
        - font-size: 0.75em
      custom_fields:
        logo:
          - justify-self: center
          - align-self: center
    tap_action:
      action: toggle
    hold_action:
      action: more-info

###############################
## ESPHOME UPDATE GROUP CARD ##
###############################
esphome_update_group_card:
  default:
    - icon: mdi:chip
  card:
    type: custom:mushroom-template-card
    entity: '[[group_entity]]'
    primary: '[[primary]]'
    multiline_secondary: true
    vertical: true
    icon: '[[icon]]'
    secondary: >-
      {% set ents = expand('[[group_entity]]') | list %}
      {% set available = ents | rejectattr('state', 'in', ['unknown', 'unavailable']) | list %}
      {% set unavailable = ents | selectattr('state', 'in', ['unknown', 'unavailable']) | list %}
      {% set pending = available | selectattr('state', 'eq', 'on') | list %}
      {% set flashing = available | selectattr('attributes.in_progress', 'eq', true) | list %}
      {% set total = ents | count %}
      {% set available_count = available | count %}
      {% set unavailable_count = unavailable | count %}
      {% set pending_count = pending | count %}
      {% set flashing_count = flashing | count %}
      {% set done_count = available_count - pending_count %}
      {% if total == 0 %}
        No entities
      {% elif flashing_count > 0 %}
        Updating {{ flashing[0].name }}
        {{ done_count }}/{{ available_count }} done · {{ pending_count }} pending
        {%- if unavailable_count > 0 %} · {{ unavailable_count }} unavailable{%- endif %}
      {% elif pending_count > 0 %}
        {{ pending_count }} pending · {{ done_count }}/{{ available_count }} up-to-date
        {%- if unavailable_count > 0 %} · {{ unavailable_count }} unavailable{%- endif %}
      {% elif unavailable_count == total %}
        All {{ total }} unavailable
      {% elif unavailable_count > 0 %}
        {{ available_count }} up-to-date · {{ unavailable_count }} unavailable
      {% else %}
        All {{ total }} up-to-date
      {% endif %}
    color: >-
      {% set ents = expand('[[group_entity]]') | list %}
      {% set available = ents | rejectattr('state', 'in', ['unknown', 'unavailable']) | list %}
      {% set unavailable_count = ents | selectattr('state', 'in', ['unknown', 'unavailable']) | list | count %}
      {% set pending_count = available | selectattr('state', 'eq', 'on') | list | count %}
      {% set flashing_count = available | selectattr('attributes.in_progress', 'eq', true) | list | count %}
      {% if flashing_count > 0 %}
        blue
      {% elif pending_count > 0 %}
        amber
      {% elif unavailable_count > 0 %}
        red
      {% else %}
        green
      {% endif %}
    badge_icon: >-
      {% set ents = expand('[[group_entity]]') | list %}
      {% set available = ents | rejectattr('state', 'in', ['unknown', 'unavailable']) | list %}
      {% set unavailable_count = ents | selectattr('state', 'in', ['unknown', 'unavailable']) | list | count %}
      {% set pending_count = available | selectattr('state', 'eq', 'on') | list | count %}
      {% set flashing_count = available | selectattr('attributes.in_progress', 'eq', true) | list | count %}
      {% if flashing_count > 0 %}
        mdi:progress-download
      {% elif pending_count > 0 %}
        mdi:package-up
      {% elif unavailable_count > 0 %}
        mdi:alert-circle
      {% else %}
        mdi:check-bold
      {% endif %}
    badge_color: >-
      {% set ents = expand('[[group_entity]]') | list %}
      {% set available = ents | rejectattr('state', 'in', ['unknown', 'unavailable']) | list %}
      {% set unavailable_count = ents | selectattr('state', 'in', ['unknown', 'unavailable']) | list | count %}
      {% set pending_count = available | selectattr('state', 'eq', 'on') | list | count %}
      {% set flashing_count = available | selectattr('attributes.in_progress', 'eq', true) | list | count %}
      {% if flashing_count > 0 %}
        blue
      {% elif pending_count > 0 %}
        amber
      {% elif unavailable_count > 0 %}
        red
      {% else %}
        green
      {% endif %}
    badge_text: >-
      {% set ents = expand('[[group_entity]]') | list %}
      {% set available = ents | rejectattr('state', 'in', ['unknown', 'unavailable']) | list %}
      {% set unavailable_count = ents | selectattr('state', 'in', ['unknown', 'unavailable']) | list | count %}
      {% set pending_count = available | selectattr('state', 'eq', 'on') | list | count %}
      {% set flashing_count = available | selectattr('attributes.in_progress', 'eq', true) | list | count %}
      {% if flashing_count > 0 %}
        {{ flashing_count }}
      {% elif pending_count > 0 %}
        {{ pending_count }}
      {% elif unavailable_count > 0 %}
        {{ unavailable_count }}
      {% else %}
        {{ available | count }}
      {% endif %}
    tap_action:
      action: call-service
      service: script.update_esphome_group
      data:
        group_entity: '[[group_entity]]'
    hold_action:
      action: more-info


##############################
## DISK USAGE MUSHROOM CARD ##
##############################
disk_usage_mushroom_card:
  card:
    type: custom:mushroom-template-card
    entity: '[[usage_entity]]'
    primary: '[[name]]'
    secondary: >-
      {%- set s = states('[[usage_entity]]') -%}
      {%- set temp = states('[[temp_entity]]') -%}
      {%- set used = state_attr('[[usage_entity]]', 'used') -%}
      {%- set total = state_attr('[[usage_entity]]', 'total') -%}
      {%- if s in ['unknown', 'unavailable', 'none', 'None', ''] -%}
        Unavailable
      {%- else -%}
        {{ temp }} °C · {{ s | float(0) | round(1) }}%{{ '\n' }}{{ used }} / {{ total }}
      {%- endif -%}
    icon: '[[icon]]'
    icon_color: >-
      {%- set s = states('[[usage_entity]]') -%}
      {%- set health_state = states('[[health_entity]]') -%}
      {%- if s in ['unknown', 'unavailable', 'none', 'None', ''] or health_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
        disabled
      {%- elif is_state('[[health_entity]]', 'on') or s | float(0) >= 90 -%}
        red
      {%- elif s | float(0) >= 80 -%}
        amber
      {%- else -%}
        [[ok_color]]
      {%- endif -%}
    multiline_secondary: true
    fill_container: true
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          min-height: 104px;
        }
