substitutions:
  device_name: "Ledstrip Study Workbench"

esphome:
  name: "ledstrip-study-workbench"
  comment: ESP32C3
  platformio_options:
    board_build.f_cpu: 80000000L  # Set CPU frequency to 80MHz
  on_boot:
    priority: -100  # Run after most other components have initialized
    then:
      - light.turn_on:
          id: ledstrip
          effect: "Rainbow Swirl"
      - delay: 5s
      - light.turn_off:
          id: ledstrip

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

packages:
  wifi: !include /config/esphome/common/wifi.yaml
  network_diagnostics: !include /config/esphome/common/network_diagnostics.yaml
  base_config: !include /config/esphome/common/base_config.yaml

e131:
  method: unicast

status_led:
  pin: GPIO2

power_supply:
  - id: led_power_control
    pin: GPIO18  # GPIO pin connected to the gate of the IRLZ34N via 100 Ohm

light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: GRB
    pin: GPIO6
    num_leds: 91
    power_supply: led_power_control
    gamma_correct: 1.3
    color_correct: [100%, 80%, 80%]
    name: "${device_name}"
    id: ledstrip
    internal: false
    effects:
      - e131:
          universe: 1
          channels: RGB
      - addressable_rainbow:
          name: Rainbow Swirl
          speed: 10
          width: 154
      - addressable_color_wipe:
          name: "Colorful Wipe"
          colors:
            - red: 100%
              green: 0%
              blue: 0%
              num_leds: 91
            - red: 0%
              green: 100%
              blue: 0%
              num_leds: 91
            - red: 0%
              green: 0%
              blue: 100%
              num_leds: 91
          add_led_interval: 100ms
      - addressable_scan:
          name: "Ping Pong"
          move_interval: 100ms
          scan_width: 10
      - addressable_lambda:
          name: "Simple Color Wipe"
          update_interval: 100ms
          lambda: |-
            for (int i = it.size() - 1; i > 0; i--) {
              it[i] = it[i - 1].get();
            }
            it[0] = Color::random_color();
      - addressable_lambda:
          name: "Random Sparkle"
          update_interval: 50ms
          lambda: |-
            it.all().fade_to_black(50);
            if (random_uint32() % 10 > 8) {
              it[random_uint32() % it.size()] = Color::random_color();
            }
      - addressable_lambda:
          name: "Gradient Shift"
          update_interval: 50ms
          lambda: |-
            static uint8_t start_hue = 0;
            it.shift_right(1);
            start_hue++;
            it[0] = ESPHSVColor(start_hue, 255, 255);

  # Partition 1: First 25 LEDs (0-24)
  - platform: partition
    name: "LED Strip - Soldering Section"
    id: soldering_section
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF
    segments:
      - id: ledstrip
        from: 0
        to: 24
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 20%
          max_brightness: 100%

  - platform: partition
    name: "LED Strip - Main Section"
    id: main_section
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF
    segments:
      - id: ledstrip
        from: 25
        to: 90
    effects:
      - e131:
          universe: 1
          channels: RGB
      - addressable_rainbow:
          name: Rainbow Swirl
          speed: 10
          width: 154
      - addressable_color_wipe:
          name: "Colorful Wipe"
          colors:
            - red: 100%
              green: 0%
              blue: 0%
              num_leds: 66
            - red: 0%
              green: 100%
              blue: 0%
              num_leds: 66
            - red: 0%
              green: 0%
              blue: 100%
              num_leds: 66
          add_led_interval: 100ms
      - addressable_scan:
          name: "Ping Pong"
          move_interval: 100ms
          scan_width: 10
      - addressable_lambda:
          name: "Simple Color Wipe"
          update_interval: 100ms
          lambda: |-
            for (int i = it.size() - 1; i > 0; i--) {
              it[i] = it[i - 1].get();
            }
            it[0] = Color::random_color();
      - addressable_lambda:
          name: "Random Sparkle"
          update_interval: 50ms
          lambda: |-
            it.all().fade_to_black(50);
            if (random_uint32() % 10 > 8) {
              it[random_uint32() % it.size()] = Color::random_color();
            }
      - addressable_lambda:
          name: "Gradient Shift"
          update_interval: 50ms
          lambda: |-
            static uint8_t start_hue = 0;
            it.shift_right(1);
            start_hue++;
            it[0] = ESPHSVColor(start_hue, 255, 255);
