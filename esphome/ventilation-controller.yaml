substitutions:
  device_name: "Ventilation Controller ESP32"
  device_name_short: "Ventilation ESP32"
  espname: "ventilation-controller"

esphome:
  name: "ventilation-controller"
  comment: "ESP32 Devkit v1" #See https://www.aliexpress.com/snapshot/0.html?orderId=8129027763971973&productId=4000244398073
  # Description: 
  # ESP32 Development Board ESP-32 ESP-32S WiFi Bluetooth Dual Cores CPU MCU Board IOT For LuaNode For NodeMcu ESP32S

esp32:
  board: esp32doit-devkit-v1

packages:
  wifi: !include /config/esphome/common/wifi.yaml
  network_diagnostics: !include /config/esphome/common/network_diagnostics.yaml
  base_config: !include /config/esphome/common/base_config.yaml

wifi:
  ap:
    ssid: ${device_name_short} Hotspot

output:
  - platform: ledc
    pin: 22
    id: pwm_output

fan:
  - platform: speed
    output: pwm_output
    speed_count: 100
    name: "Ventilation System"
    id: ventilationsystem

text_sensor:
  - platform: template
    name: "Ventilation Determining Factor"
    id: ventilation_determining_factor
    update_interval: 5s
    lambda: |-
      if (id(fan_speed_override).state) {
        return {"Manual Override"};
      }

      float co2 = id(fan_setting_co2).state;
      float humidity = id(fan_setting_humidity).state;
      float bathroom = id(fan_setting_bathroom_humidity).state;

      if (co2 >= humidity && co2 >= bathroom) {
        return {"CO2"};
      } else if (humidity >= co2 && humidity >= bathroom) {
        return {"Humidity"};
      } else {
        return {"Bathroom Humidity"};
      }

binary_sensor:
  - platform: template
    name: "Humidity Ventilation Allowed"
    id: humidity_ventilation_allowed
    icon: mdi:fan-check
    lambda: |-
      const float drying_potential = id(humidity_drying_potential).state;

      if (isnan(drying_potential)) {
        return false;
      }

      return drying_potential > 0.5;

sensor:
  # ADC sensors
  - platform: adc
    pin: 35
    name: "Downstairs CO2 Input"
    update_interval: 1s
    filters:
      - multiply: 16.93
      - or:
        - throttle_average: 60s
        - delta: 0.5
  - platform: adc
    pin: 34
    name: "Analog Output Voltage"
    update_interval: 1s
    filters:
      - multiply: 16.16
      - or:
        - throttle_average: 60s
        - delta: 0.5
  - platform: adc
    pin: 33
    name: "Bathroom Button Signal"
    update_interval: 1s
    internal: true
    filters:
      - multiply: 16.93
      - or:
        - throttle_average: 60s
        - delta: 0.5
  - platform: adc
    pin: 32
    name: "12V Board Supply Voltage"
    update_interval: 1s
    filters:
      - multiply: 16.93
      - or:
        - throttle_average: 60s
        - delta: 0.5

  # ---------------------------------------------------------------------------
  # Outdoor / reference climate sensors
  # ---------------------------------------------------------------------------
  - platform: homeassistant
    name: "Shed AQM Temperature"
    entity_id: sensor.shed_aqm_temperature
    id: ha_shed_aqm_temperature
    device_class: "temperature"
  - platform: homeassistant
    name: "Shed AQM Humidity"
    entity_id: sensor.shed_aqm_humidity
    id: ha_shed_aqm_humidity
    device_class: "humidity"

  # ---------------------------------------------------------------------------
  # Indoor temperature sensors
  # ---------------------------------------------------------------------------
  - platform: homeassistant
    name: "Home Mean Room Temperature"
    entity_id: sensor.home_mean_room_temperature
    id: ha_home_mean_room_temperature
    device_class: "temperature"
  - platform: homeassistant
    name: "Home Median Room Temperature"
    entity_id: sensor.home_median_room_temperature
    id: ha_home_median_room_temperature
    device_class: "temperature"

  # ---------------------------------------------------------------------------
  # Indoor humidity sensors
  # ---------------------------------------------------------------------------
  - platform: homeassistant
    name: "Home Max Humidity"
    entity_id: sensor.home_max_humidity
    id: ha_home_max_humidity
    device_class: "humidity"
  - platform: homeassistant
    name: "Home Mean Humidity"
    entity_id: sensor.home_mean_humidity
    id: ha_home_mean_humidity
    device_class: "humidity"
  - platform: homeassistant
    name: "Home Mean Humidity Without Bathroom"
    entity_id: sensor.home_mean_humidity_without_bathroom
    id: ha_home_mean_humidity_without_bathroom
    device_class: "humidity"
  - platform: homeassistant
    name: "Home Median Humidity"
    entity_id: sensor.home_median_humidity
    id: ha_home_median_humidity
    device_class: "humidity"

  # ---------------------------------------------------------------------------
  # Bathroom humidity sensors
  # ---------------------------------------------------------------------------
  - platform: homeassistant
    name: "Bathroom Humidity"
    entity_id: sensor.humidity_bathroom
    id: ha_humidity_bathroom
    device_class: "humidity"
  - platform: homeassistant
    name: "Bathroom Humidity Min"
    entity_id: sensor.humidity_bathroom_min
    id: ha_humidity_bathroom_min
    device_class: "humidity"
  - platform: homeassistant
    name: "Bathroom Humidity Max"
    entity_id: sensor.humidity_bathroom_max
    id: ha_humidity_bathroom_max
    device_class: "humidity"

  # ---------------------------------------------------------------------------
  # Indoor CO₂ sensors
  # ---------------------------------------------------------------------------
  - platform: homeassistant
    name: "Home Max CO2"
    entity_id: sensor.home_max_co2
    id: ha_home_max_co2
    device_class: "carbon_dioxide"
  - platform: homeassistant
    name: "Home Mean CO2"
    entity_id: sensor.home_mean_co2
    id: ha_home_mean_co2
    device_class: "carbon_dioxide"
  - platform: homeassistant
    name: "Home Median CO2"
    entity_id: sensor.home_median_co2
    id: ha_home_median_co2
    device_class: "carbon_dioxide"
  - platform: homeassistant
    name: "Bedroom CO2 Concentration"
    entity_id: sensor.bedroom_co2
    id: ha_co2_bedroom
    device_class: "carbon_dioxide"
  - platform: homeassistant
    name: "Bedroom CO2 Concentration Min"
    entity_id: sensor.co2_value_bedroom_min
    id: ha_co2_bedroom_min
    device_class: "carbon_dioxide"
  - platform: homeassistant
    name: "Study CO2 Concentration"
    entity_id: sensor.study_co2
    id: ha_co2_study
    device_class: "carbon_dioxide"
  - platform: homeassistant
    name: "Livingroom CO2 Concentration"
    entity_id: sensor.living_room_co2
    id: ha_co2_livingroom
    device_class: "carbon_dioxide"

  # ---------------------------------------------------------------------------
  # Indoor PM2.5 sensors
  # ---------------------------------------------------------------------------
  - platform: homeassistant
    name: "Home Max PM2.5 Concentration"
    entity_id: sensor.home_max_pm2_5_concentration
    id: ha_home_max_pm2_5_concentration
    device_class: "pm25"
  - platform: homeassistant
    name: "Home Mean PM2.5 Concentration"
    entity_id: sensor.home_mean_pm2_5_concentration
    id: ha_home_mean_pm2_5_concentration
    device_class: "pm25"
  - platform: homeassistant
    name: "Home Median PM2.5 Concentration"
    entity_id: sensor.home_median_pm2_5_concentration
    id: ha_home_median_pm2_5_concentration
    device_class: "pm25"

  # Template sensors:
  - platform: template
    name: "Ventilation Setting Bathroom Humidity"
    id: fan_setting_bathroom_humidity
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    filters:
      - throttle_average: 60s
    lambda: |-
      float bathroom_humidity = id(ha_humidity_bathroom).state;
      float baseline_humidity = id(ha_home_mean_humidity_without_bathroom).state;
      if (isnan(bathroom_humidity) || isnan(baseline_humidity)) {
        return 0;
      }
      float start_humidity = baseline_humidity + 10.0;
      float target_humidity = 90.0;
      float humidity_range = target_humidity - start_humidity;
      if (humidity_range < 10.0) {
        start_humidity = baseline_humidity;
        target_humidity = 95.0;
        humidity_range = target_humidity - start_humidity;
      }
      float ramp_end_humidity = start_humidity + (humidity_range / 2.0);
      float fan_setting = 0.0;
      if (bathroom_humidity > start_humidity) {
        fan_setting = (
          (bathroom_humidity - start_humidity) /
          (ramp_end_humidity - start_humidity)
        ) * 100.0;
      }
      if (fan_setting < 0.0) {
        fan_setting = 0.0;
      }
      if (fan_setting > 100.0) {
        fan_setting = 100.0;
      }
      return round(fan_setting);

  # ---------------------------------------------------------------------------
  # Absolute humidity diagnostics
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Indoor Absolute Humidity"
    id: indoor_absolute_humidity
    icon: mdi:water-percent
    unit_of_measurement: "g/m³"
    accuracy_decimals: 2
    update_interval: 5s
    filters:
      - throttle_average: 60s
    lambda: |-
      const float temperature_c = id(ha_home_mean_room_temperature).state;
      const float relative_humidity = id(ha_home_mean_humidity_without_bathroom).state;

      if (isnan(temperature_c) || isnan(relative_humidity)) {
        return NAN;
      }

      if (relative_humidity < 0.0 || relative_humidity > 100.0) {
        return NAN;
      }

      // Saturation vapor pressure in hPa.
      const float saturation_vapor_pressure =
        6.112 * exp((17.67 * temperature_c) / (temperature_c + 243.5));

      // Actual vapor pressure in hPa.
      const float vapor_pressure =
        saturation_vapor_pressure * relative_humidity / 100.0;

      // Absolute humidity in g/m³.
      const float absolute_humidity =
        216.7 * vapor_pressure / (temperature_c + 273.15);

      return absolute_humidity;

  - platform: template
    name: "Outdoor Absolute Humidity"
    id: outdoor_absolute_humidity
    icon: mdi:water-percent
    unit_of_measurement: "g/m³"
    accuracy_decimals: 2
    update_interval: 5s
    filters:
      - throttle_average: 60s
    lambda: |-
      const float temperature_c = id(ha_shed_aqm_temperature).state;
      const float relative_humidity = id(ha_shed_aqm_humidity).state;

      if (isnan(temperature_c) || isnan(relative_humidity)) {
        return NAN;
      }

      if (relative_humidity < 0.0 || relative_humidity > 100.0) {
        return NAN;
      }

      // Saturation vapor pressure in hPa.
      const float saturation_vapor_pressure =
        6.112 * exp((17.67 * temperature_c) / (temperature_c + 243.5));

      // Actual vapor pressure in hPa.
      const float vapor_pressure =
        saturation_vapor_pressure * relative_humidity / 100.0;

      // Absolute humidity in g/m³.
      const float absolute_humidity =
        216.7 * vapor_pressure / (temperature_c + 273.15);

      return absolute_humidity;

  - platform: template
    name: "Humidity Drying Potential"
    id: humidity_drying_potential
    icon: mdi:water-minus
    unit_of_measurement: "g/m³"
    accuracy_decimals: 2
    update_interval: 10s
    filters:
      - throttle_average: 60s
    lambda: |-
      const float indoor_ah = id(indoor_absolute_humidity).state;
      const float outdoor_ah = id(outdoor_absolute_humidity).state;

      if (isnan(indoor_ah) || isnan(outdoor_ah)) {
        return NAN;
      }

      return indoor_ah - outdoor_ah;

  - platform: template
    name: "Ventilation Setting Humidity"
    id: fan_setting_humidity
    update_interval: 10s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    lambda: |-
      // Get the current and minimum humidity values
      float median_humidity = id(ha_home_median_humidity).state;
      float max_humidity = id(ha_home_max_humidity).state;

      // Calculate the difference between the current humidity and the minimum humidity
      float humidity_diff = max_humidity - median_humidity;

      // Calculate the fan setting based on the difference
      float fan_setting = 0.0;
      if (humidity_diff >= 0.0) {
        fan_setting = humidity_diff / (100.0 - median_humidity) * 100.0;
      }

      // Set the fan setting to the nearest speed value
      float rounded_fan_setting = round(fan_setting);

      // Return the fan setting
      return rounded_fan_setting;

  - platform: template
    name: "Ventilation Setting CO2"
    id: fan_setting_co2
    update_interval: 10s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    lambda: |-
      // Get the current and minimum humidity values
      float max_co2_concentration = id(ha_home_max_co2).state;
      float median_co2_concentration = id(ha_home_median_co2).state;

      // Fan sensitivity in % per PPM
      float fan_sensitivity = id(number_co2_fan_sensitivity).state;
      // Offset CO2 value
      float co2_offset = id(number_co2_offset).state;

      // Calculate the fan setting based on the difference
      float fan_setting = 0.0;
      float fan_setting_max_CO2 = (max_co2_concentration - co2_offset) * fan_sensitivity;
      float fan_setting_median_CO2 = (median_co2_concentration - co2_offset) * (fan_sensitivity * 2);

      fan_setting = max(fan_setting_max_CO2, fan_setting_median_CO2);

      // Set the fan setting to the nearest speed value
      float rounded_fan_setting = round(fan_setting);


      if (rounded_fan_setting > 100) {
        // If it is, return the limit value
        return 100;
      } else {
        // Otherwise, return the current value
        return rounded_fan_setting;
      }

  - platform: template
    name: "Fan Speed Setting"
    id: fan_speed_setting
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    filters:
      - or:
        - throttle_average: 60s
        - delta: 10.0
    lambda: |-
      float var_fan_setting_co2 = id(fan_setting_co2).state;
      float var_fan_setting_humidity = id(fan_setting_humidity).state;
      float var_fan_setting_bathroom = id(fan_setting_bathroom_humidity).state;
      if (isnan(var_fan_setting_co2)) {
        var_fan_setting_co2 = 0;
      }
      if (isnan(var_fan_setting_humidity)) {
        var_fan_setting_humidity = 0;
      }
      if (isnan(var_fan_setting_bathroom)) {
        var_fan_setting_bathroom = 0;
      }
      float fan_setting = max(
        max(var_fan_setting_co2, var_fan_setting_humidity),
        var_fan_setting_bathroom
      );
      if (id(fan_speed_override).state) {
        fan_setting = id(override_fan_speed).state;
      }
      if (fan_setting > 100.0) {
        return 100;
      }
      if (fan_setting < 0.0) {
        return 0;
      }
      return round(fan_setting);
    on_value:
      then:
        - fan.turn_on:
            id: ventilationsystem
            speed: !lambda "return id(fan_speed_setting).state;"

number:
  - platform: template
    name: Override Fan Speed
    icon: mdi:fan
    min_value: 0
    step: 1
    max_value: 100
    optimistic: true
    id: override_fan_speed
    internal: false
    entity_category: "config"

  - platform: template
    name: Override Fan Duration
    icon: mdi:clock
    unit_of_measurement: min
    min_value: 15
    step: 5
    max_value: 600
    optimistic: true
    id: override_fan_duration
    internal: false
    entity_category: "config"

  - platform: template
    name: "CO2 Offset"
    optimistic: true
    initial_value: 400
    restore_value: true
    min_value: 0
    max_value: 1000
    step: 1
    id: number_co2_offset
    internal: false
    entity_category: "config"

  - platform: template
    name: "CO2 Fan Sensitivity"
    optimistic: true
    initial_value: 0.1 # in % per ppm
    restore_value: true
    min_value: 0
    max_value: 10
    step: 0.01
    id: number_co2_fan_sensitivity
    internal: false
    entity_category: "config"

switch:
  - platform: template
    name: "Fan Speed Override"
    optimistic: true
    id: fan_speed_override
    on_turn_on:
      - fan.turn_on:
          id: ventilationsystem
          speed: !lambda "return id(override_fan_speed).state;"
      - delay: !lambda "return (id(override_fan_duration).state) * 60 * 1000;"
      - switch.turn_off: fan_speed_override
    on_turn_off:
      - delay: 5s
      - fan.turn_on:
          id: ventilationsystem
          speed: !lambda "return id(fan_speed_setting).state;"
