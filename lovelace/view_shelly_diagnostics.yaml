title: Shelly Diagnostics
icon: mdi:shield-bug-outline
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: Shelly availability
        secondary: >-
          {%- set devices = [
            'binary_sensor.ping_shelly_closet',
            'binary_sensor.ping_shelly_dinnertable',
            'binary_sensor.ping_shelly_kitchen',
            'binary_sensor.ping_shelly_livingroom',
            'binary_sensor.ping_shelly_porch',
            'binary_sensor.ping_shelly_entry',
            'binary_sensor.ping_shelly_backgarden',
            'binary_sensor.ping_shelly_bathroom',
            'binary_sensor.ping_shelly_bedroom',
            'binary_sensor.ping_shelly_baby_room',
            'binary_sensor.ping_shelly_hallway_1st_floor',
            'binary_sensor.ping_shelly_guest_room',
            'binary_sensor.ping_shelly_hallway_2nd_floor',
            'binary_sensor.ping_shelly_study',
            'binary_sensor.ping_shelly_washroom'
          ] -%}
          {%- set online = devices | select('is_state', 'on') | list | count -%}
          {%- set offline = devices | select('is_state', 'off') | list | count -%}
          {{ online }} online · {{ offline }} offline
        icon: mdi:lan-check
        icon_color: >-
          {%- set devices = [
            'binary_sensor.ping_shelly_closet',
            'binary_sensor.ping_shelly_dinnertable',
            'binary_sensor.ping_shelly_kitchen',
            'binary_sensor.ping_shelly_livingroom',
            'binary_sensor.ping_shelly_porch',
            'binary_sensor.ping_shelly_entry',
            'binary_sensor.ping_shelly_backgarden',
            'binary_sensor.ping_shelly_bathroom',
            'binary_sensor.ping_shelly_bedroom',
            'binary_sensor.ping_shelly_baby_room',
            'binary_sensor.ping_shelly_hallway_1st_floor',
            'binary_sensor.ping_shelly_guest_room',
            'binary_sensor.ping_shelly_hallway_2nd_floor',
            'binary_sensor.ping_shelly_study',
            'binary_sensor.ping_shelly_washroom'
          ] -%}
          {%- set offline = devices | select('is_state', 'off') | list | count -%}
          {{ 'red' if offline > 0 else 'green' }}
        multiline_secondary: true
      - type: custom:mushroom-template-card
        entity: sensor.shelly_max_ping
        primary: Ping health
        secondary: >-
          Median {{ states('sensor.shelly_median_ping') | float(0) | round(0) }} ms ·
          Max {{ states('sensor.shelly_max_ping') | float(0) | round(0) }} ms
        icon: mdi:speedometer
        icon_color: >-
          {%- set max_ping = states('sensor.shelly_max_ping') | float(9999) -%}
          {%- if max_ping > 500 -%}
            red
          {%- elif max_ping > 150 -%}
            amber
          {%- else -%}
            green
          {%- endif -%}
        multiline_secondary: true

  - type: vertical-stack
    cards:
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.ping_shelly_closet
            primary: Closet
            secondary: >-
              {%- set ping = states('sensor.ping_shelly_closet_round_trip_time_average') -%}
              {%- if is_state(entity, 'on') -%}
                Online · {{ ping | float(0) | round(0) }} ms
              {%- elif is_state(entity, 'off') -%}
                Offline
              {%- else -%}
                Unknown
              {%- endif -%}
            icon: mdi:power-socket-eu
            icon_color: >-
              {%- set ping = states('sensor.ping_shelly_closet_round_trip_time_average') | float(9999) -%}
              {%- if is_state(entity, 'off') -%}
                red
              {%- elif is_state(entity, 'on') and ping > 500 -%}
                red
              {%- elif is_state(entity, 'on') and ping > 150 -%}
                amber
              {%- elif is_state(entity, 'on') -%}
                green
              {%- else -%}
                grey
              {%- endif -%}
            fill_container: true
            tap_action:
              action: more-info
            hold_action:
              action: navigate
              navigation_path: /config/devices/device/f6c6bf8732aa1f0efbd32c3e27b16703
            card_mod:
              style: |
