  - type: vertical-stack
    cards:
      - type: custom:collapsable-cards
        title: Batterijen
        cards:
          - type: glance
            title: Battery Levels
            columns: 4
            entities:
              - entity: sensor.climate_badkamer_battery
                name: Badkamer
              - entity: sensor.climate_slaapkamer_battery
                name: Slaapkamer
              - entity: sensor.climate_babykamer_battery
                name: Babykamer
              - entity: sensor.climate_studeerkamer_battery
                name: Studeerkamer
              - entity: sensor.climate_tamara_battery
                name: Tamara
              - entity: sensor.climate_logeerkamer_battery
                name: Logeerkamer
              - entity: sensor.climate_woonkamer_battery
                name: Woonkamer
          - type: custom:apexcharts-card
            graph_span: 14d
            header:
              show: true
              title: Climate Battery
              show_states: true
              colorize_states: true
            now:
              show: true
            apex_config:
              legend:
                show: false
            chart_type: line
            update_interval: 1min
            yaxis:
              - min: 0
                max: 100
                decimals: 0
                align_to: 20
                apex_config:
                  tickAmount: 5
                  forceNiceScale: True
            all_series_config:
              fill_raw: last
              stroke_width: 3
              float_precision: 0
