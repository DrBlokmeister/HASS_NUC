title: Network
icon: 'mdi:network'
panel: false
badges: []
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.speedtest_ping
        primary: Internet
        secondary: >-
          {%- set down = states('sensor.speedtest_download') -%}
          {%- set up = states('sensor.speedtest_upload') -%}
          {%- set ping = states('sensor.speedtest_ping') -%}
          Down {{ down | float(0) | round(0) }} · Up {{ up | float(0) | round(0) }} Mbit/s
          Ping {{ ping | float(0) | round(1) }} ms
        icon: mdi:web
        icon_color: >-
          {%- set ping = states('sensor.speedtest_ping') | float(999) -%}
          {%- if ping < 10 -%}
            green
          {%- elif ping < 25 -%}
            amber
          {%- else -%}
            red
          {%- endif -%}
        multiline_secondary: true
        tap_action:
          action: more-info
      - type: custom:mushroom-template-card
        entity: sensor.udmpro_cpu_utilization
        primary: UDM Pro
        secondary: >-
          CPU {{ states('sensor.udmpro_cpu_utilization') | float(0) | round(0) }}%
          · {{ states('sensor.udmpro_cpu_temperature') | float(0) | round(0) }} °C
          SFP+ {{ states('sensor.udmpro_phy_temperature') | float(0) | round(0) }} °C
        icon: mdi:router-network
        icon_color: >-
          {%- set temp = states('sensor.udmpro_cpu_temperature') | float(0) -%}
          {%- if temp >= 70 -%}
            red
          {%- elif temp >= 60 -%}
            amber
          {%- else -%}
            green
          {%- endif -%}
        multiline_secondary: true
      - type: custom:mushroom-template-card
        entity: sensor.usw_pro_max_16_poe_temperature
        primary: PoE switch
        secondary: >-
          CPU {{ states('sensor.usw_pro_max_16_poe_cpu_utilization') | float(0) | round(0) }}%
          · {{ states('sensor.usw_pro_max_16_poe_temperature') | float(0) | round(0) }} °C
          Cabinet {{ states('sensor.temperature_utility_cabinet') | float(0) | round(0) }} °C
        icon: mdi:switch
        icon_color: >-
          {%- set temp = states('sensor.usw_pro_max_16_poe_temperature') | float(0) -%}
          {%- if temp >= 60 -%}
            red
          {%- elif temp >= 50 -%}
            amber
          {%- else -%}
            green
          {%- endif -%}
        multiline_secondary: true
      - type: custom:mushroom-template-card
        entity: sensor.u6_lr_clients
        primary: Wi-Fi clients
        secondary: >-
          {%- set total =
            states('sensor.u6_lr_clients') | int(0)
            + states('sensor.ap_lite_1st_floor_clients') | int(0)
            + states('sensor.u6_pro_2nd_floor_clients') | int(0)
            + states('sensor.ap_lite_outside_clients') | int(0)
          -%}
          {{ total }} total
          LR {{ states('sensor.u6_lr_clients') | int(0) }}
          · 1F {{ states('sensor.ap_lite_1st_floor_clients') | int(0) }}
          · 2F {{ states('sensor.u6_pro_2nd_floor_clients') | int(0) }}
          · Out {{ states('sensor.ap_lite_outside_clients') | int(0) }}
        icon: mdi:wifi
        icon_color: blue
        multiline_secondary: true

  - type: vertical-stack
    cards:
      - type: custom:mushroom-template-card
        primary: UniFi firmware
        secondary: >-
          {%- set updates = [
            'update.udmpro',
            'update.usw_pro_max_16_poe',
            'update.usw_flex_xg',
            'update.usw_flex_mini_mediacenter',
            'update.usw_flex_mini_heatpump',
            'update.ap_lr_ground_floor',
            'update.ap_lite_1st_floor',
            'update.ap_pro_2nd_floor',
            'update.ap_lite_outside'
          ] -%}
          {%- set pending = updates | select('is_state', 'on') | list | count -%}
          {%- set unavailable = updates | select('is_state', 'unavailable') | list | count -%}
          {%- if pending > 0 -%}
            {{ pending }} update{{ 's' if pending != 1 else '' }} pending
            {%- if unavailable > 0 %} · {{ unavailable }} unavailable{%- endif -%}
          {%- elif unavailable > 0 -%}
            Up-to-date · {{ unavailable }} unavailable
          {%- else -%}
            All devices up-to-date
          {%- endif -%}
        icon: mdi:package-up
        icon_color: >-
          {%- set updates = [
            'update.udmpro',
            'update.usw_pro_max_16_poe',
            'update.usw_flex_xg',
            'update.usw_flex_mini_mediacenter',
            'update.usw_flex_mini_heatpump',
            'update.ap_lr_ground_floor',
            'update.ap_lite_1st_floor',
            'update.ap_pro_2nd_floor',
            'update.ap_lite_outside'
          ] -%}
          {%- set pending = updates | select('is_state', 'on') | list | count -%}
          {%- if pending > 0 -%}
            amber
          {%- else -%}
            green
          {%- endif -%}
        tap_action:
          action: more-info
        multiline_secondary: true
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: update.udmpro
            primary: UDM Pro
            secondary: >-
              {%- if is_state('update.udmpro', 'on') -%}
                Update available
              {%- elif is_state('update.udmpro', 'off') -%}
                Up-to-date
              {%- elif is_state('update.udmpro', 'unavailable') -%}
                Unavailable
              {%- else -%}
                {{ states('update.udmpro') | replace('_', ' ') | title }}
              {%- endif -%}
            icon: mdi:router-network
            icon_color: >-
              {%- if is_state('update.udmpro', 'on') -%}
                amber
              {%- elif is_state('update.udmpro', 'off') -%}
                green
              {%- else -%}
                grey
              {%- endif -%}
            fill_container: true
            tap_action:
              action: call-service
              service: update.install
              target:
                entity_id: update.udmpro
              confirmation:
                text: Update firmware for UDM Pro?
            hold_action:
