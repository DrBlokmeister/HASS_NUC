  - type: vertical-stack
    cards:
      - type: custom:mushroom-title-card
        title: ''
        subtitle: Internet / WAN
        alignment: center

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.unifi_dream_machine_download_speed
            name: WAN download
            icon: mdi:download-network

          - type: custom:mushroom-entity-card
            entity: sensor.unifi_dream_machine_upload_speed
            name: WAN upload
            icon: mdi:upload-network

          - type: custom:mushroom-entity-card
            entity: sensor.unifi_dream_machine_data_received
            name: Data received
            icon: mdi:progress-download

          - type: custom:mushroom-entity-card
            entity: sensor.unifi_dream_machine_data_sent
            name: Data sent
            icon: mdi:progress-upload

          - type: custom:mushroom-template-card
            entity: sensor.speedtest_download
            primary: Speedtest
            secondary: >-
              {{ states('sensor.speedtest_download') | float(0) | round(0) }} down
              · {{ states('sensor.speedtest_upload') | float(0) | round(0) }} up
              · {{ states('sensor.speedtest_ping') | float(0) | round(1) }} ms
            icon: mdi:speedometer
            icon_color: blue
            multiline_secondary: true
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Reload speedtest
            secondary: Run integration reload
            icon: mdi:reload
            icon_color: amber
            tap_action:
              action: call-service
              service: homeassistant.reload_config_entry
              target:
                device_id: 5339147a29211a8fe30012ef2f3b9fe1
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.speedtest_download
            name: Down
          - entity: sensor.speedtest_upload
            name: Up
          - entity: sensor.speedtest_ping
            name: Ping
            y_axis: 'secondary'
        icon: mdi:swap-vertical-bold
        name: Speedtest
        hours_to_show: 48
        points_per_hour: 1
        hour24: true
        font_size: 70
        height: 250
        line_width: 2.5
        lower_bound: 300
        upper_bound: 1000
        lower_bound_secondary: 0
        upper_bound_secondary: 20
        show:
          labels: true
          average: true
          labels_secondary: true

  - type: custom:apexcharts-card
    header:
      title: Router Speeds
      show: true
      show_states: true
      colorize_states: true
    update_interval: 10min
    graph_span: 24h
    apex_config:
      chart:
        height: 250px
      legend:
        show: false
    all_series_config:
      group_by:
        func: median
        duration: 15min
      stroke_width: 2
      type: area
    yaxis:
      - min: 0
        max: ~500
        decimals: 0
        align_to: 100
        apex_config:
          #tickAmount: 4
          forceNiceScale: True
          labels:
            formatter: |
              EVAL:function(value) {
                return `${value} Mbps`;
              }
    #layout: minimal
    series:
      - entity: sensor.unifi_dream_machine_download_speed
        name: Down
        color: '#36A2EB'  # Blue
      - entity: sensor.unifi_dream_machine_upload_speed
        name: Up
        color: '#FF6384'  # Red

