  ###########################################################################
  # PLAYERS
  ###########################################################################
  - type: vertical-stack
    cards:
      - type: media-control
        entity: media_player.plex_plexkodiconnect_kodi_coreelec
        name: Plex (Coreelec)
      - type: media-control
        entity: media_player.coreelec
        name: Kodi (Coreelec)
      - type: media-control
        entity: media_player.65_oled
        name: TV (Smartthings)
      - type: media-control
        entity: media_player.samsung_tv
        name: TV (Samsung)

  ###########################################################################
  # COREELEC VIDEO OUTPUT
  ###########################################################################
  - type: custom:collapsable-cards
    title: CoreELEC output details
    cards:
      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.coreelec_hdmi_info
            primary: HDMI mode
            secondary: >-
              {{ state_attr('sensor.coreelec_hdmi_info', 'vic_desc') }} · {{ state_attr('sensor.coreelec_hdmi_info', 'eotf') }}
            icon: mdi:video-high-definition
            icon_color: blue
            fill_container: true
          - type: custom:mushroom-template-card
            entity: sensor.coreelec_hdr_mode
            primary: HDR mode
            secondary: >-
              {{ states('sensor.coreelec_hdr_mode') }}
            icon: mdi:brightness-6
            icon_color: >-
              {% if states('sensor.coreelec_hdr_mode') in ['HDR', 'HDR10', 'HLG', 'Dolby Vision'] %}
                amber
              {% else %}
                green
              {% endif %}
            fill_container: true
          - type: custom:mushroom-template-card
            entity: sensor.coreelec_color_space
            primary: Color space
            secondary: >-
              {{ states('sensor.coreelec_color_space') }}
            icon: mdi:palette-outline
            icon_color: blue
            fill_container: true
          - type: custom:mushroom-template-card
            entity: sensor.coreelec_colorimetry
            primary: Colorimetry
            secondary: >-
              {{ states('sensor.coreelec_colorimetry') }}
            icon: mdi:palette-swatch-variant
            icon_color: blue
            fill_container: true

