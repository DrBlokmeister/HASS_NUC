title: Media Control
path: media-control
icon: mdi:television
badges: []

cards:
  ###########################################################################
  # CRITICAL STATUS / SIGNAL PATH
  ###########################################################################
  - type: markdown
    content: |
      ## Media path status
      [HyperHDR Integration](/config/integrations/integration/hyperhdr)
      [CoreELEC Device](/config/devices/device/bdcbe2052391644e09e7cc195ef78025)
      [Plex Integration](/config/integrations/integration/plex)
      [TV](/config/devices/device/0c0cf7a8857f8ea82060685b351e7d55)
  - type: vertical-stack
    cards:
      - type: grid
        square: false
        columns: 4
        cards:
          - type: custom:button-card
            entity: switch.amplifier_power
            name: Amplifier
            icon: mdi:audio-video
            show_state: true
            state_display: >
              [[[
                return entity.state === 'on' ? 'On' : 'Off';
              ]]]
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            styles:
              card:
                - padding: 12px
                - border-radius: 16px
                - background-color: >
                    [[[
                      return entity.state === 'on'
                        ? 'rgba(46, 125, 50, 0.28)'
                        : 'rgba(120, 120, 120, 0.20)';
                    ]]]
                - border: >
                    [[[
                      return entity.state === 'on'
                        ? '1px solid rgba(46, 125, 50, 0.45)'
                        : '1px solid rgba(158, 158, 158, 0.28)';
                    ]]]
              icon:
                - color: >
                    [[[
                      return entity.state === 'on' ? 'rgb(129, 199, 132)' : 'rgb(189, 189, 189)';
                    ]]]
              state:
                - font-size: 0.85em
              name:
                - font-weight: 600
          - type: custom:button-card
            entity: switch.ambilight_power
            name: Ambilight
            icon: mdi:television-ambient-light
            show_state: true
            state_display: >
              [[[
                return entity.state === 'on' ? 'On' : 'Off';
              ]]]
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            styles:
              card:
                - padding: 12px
                - border-radius: 16px
                - background-color: >
                    [[[
                      return entity.state === 'on'
                        ? 'rgba(46, 125, 50, 0.28)'
                        : 'rgba(120, 120, 120, 0.20)';
                    ]]]
                - border: >
                    [[[
                      return entity.state === 'on'
                        ? '1px solid rgba(46, 125, 50, 0.45)'
                        : '1px solid rgba(158, 158, 158, 0.28)';
                    ]]]
              icon:
                - color: >
                    [[[
                      return entity.state === 'on' ? 'rgb(129, 199, 132)' : 'rgb(189, 189, 189)';
                    ]]]
              state:
                - font-size: 0.85em
              name:
                - font-weight: 600
          - type: custom:button-card
            entity: switch.plug_tv_switch
            name: TV Plug
            icon: mdi:power-plug
            show_state: true
            state_display: >
              [[[
                return entity.state === 'on' ? 'On' : 'Off';
              ]]]
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            styles:
              card:
                - padding: 12px
                - border-radius: 16px
                - background-color: >
                    [[[
                      return entity.state === 'on'
                        ? 'rgba(46, 125, 50, 0.28)'
                        : 'rgba(120, 120, 120, 0.20)';
                    ]]]
                - border: >
                    [[[
                      return entity.state === 'on'
                        ? '1px solid rgba(46, 125, 50, 0.45)'
                        : '1px solid rgba(158, 158, 158, 0.28)';
                    ]]]
              icon:
                - color: >
                    [[[
                      return entity.state === 'on' ? 'rgb(129, 199, 132)' : 'rgb(189, 189, 189)';
                    ]]]
              state:
                - font-size: 0.85em
              name:
                - font-weight: 600
          - type: custom:button-card
            entity: switch.tv_json_cec
            name: TV JSON CEC
            icon: mdi:television
            show_state: true
            state_display: >
              [[[
                return entity.state === 'on' ? 'On' : 'Off';
              ]]]
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            styles:
              card:
                - padding: 12px
                - border-radius: 16px
                - background-color: >
                    [[[
                      return entity.state === 'on'
                        ? 'rgba(46, 125, 50, 0.28)'
                        : 'rgba(120, 120, 120, 0.20)';
                    ]]]
                - border: >
                    [[[
                      return entity.state === 'on'
                        ? '1px solid rgba(46, 125, 50, 0.45)'
                        : '1px solid rgba(158, 158, 158, 0.28)';
                    ]]]
              icon:
                - color: >
                    [[[
                      return entity.state === 'on' ? 'rgb(129, 199, 132)' : 'rgb(189, 189, 189)';
                    ]]]
              state:
                - font-size: 0.85em
              name:
                - font-weight: 600
      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            entity: media_player.coreelec
            primary: CoreELEC
            secondary: >-
              {% set s = states('media_player.coreelec') %}
              {% if s in ['playing', 'paused', 'idle', 'on'] %}
                {{ s | replace('_', ' ') | title }} · {{ states('sensor.coreelec_resolution') }}
              {% else %}
                {{ s | replace('_', ' ') | title }}
              {% endif %}
            icon: mdi:kodi
            icon_color: >-
              {% set s = states('media_player.coreelec') %}
              {% if s in ['playing', 'paused'] %}
                green
              {% elif s in ['idle', 'on'] %}
                blue
              {% else %}
                red
              {% endif %}
            fill_container: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.coreelec_hdr_mode
            primary: HDMI output
            secondary: >-
              {{ states('sensor.coreelec_resolution') }} · {{ states('sensor.coreelec_hdr_mode') }} · {{ states('sensor.coreelec_color_space') }} · {{ states('sensor.coreelec_colorimetry') }}
            icon: mdi:television
            icon_color: >-
              {% if states('sensor.coreelec_hdr_mode') in ['HDR', 'HDR10', 'HLG', 'Dolby Vision'] %}
                amber
              {% else %}
                blue
              {% endif %}
            multiline_secondary: true
            fill_container: true
            tap_action:
              action: more-info
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.coreelec_hdr_mode
        primary: HDMI output
        secondary: >-
          {{ states('sensor.coreelec_resolution') }} · {{ states('sensor.coreelec_hdr_mode') }} · {{ states('sensor.coreelec_color_space') }} · {{ states('sensor.coreelec_colorimetry') }}
        icon: mdi:television
        icon_color: >-
          {% if states('sensor.coreelec_hdr_mode') in ['HDR', 'HDR10', 'HLG', 'Dolby Vision'] %}
            amber
          {% else %}
            blue
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: light.tv_ledstrip
        primary: TV LEDstrip
        secondary: >-
          {% if is_state('light.tv_ledstrip', 'on') %}
            On · {{ state_attr('light.tv_ledstrip', 'effect') or 'No effect' }}
          {% else %}
            Off
          {% endif %}
        icon: mdi:television-ambient-light
        icon_color: >-
          {% if is_state('light.tv_ledstrip', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: switch.tv_ledstrip_component_usb_capture
        primary: TV USB capture
        secondary: >-
          {% if is_state('switch.tv_ledstrip_component_usb_capture', 'on') %}
            Active · {{ states('sensor.tv_ledstrip_visible_priority') }}
          {% else %}
            Inactive
          {% endif %}
        icon: mdi:video-input-hdmi
        icon_color: >-
          {% if is_state('switch.tv_ledstrip_component_usb_capture', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: switch.ambilight_power
        primary: Ambilight power
        secondary: >-
          {% if is_state('switch.ambilight_power', 'on') %}
            Enabled
          {% else %}
            Disabled
          {% endif %}
        icon: mdi:television-ambient-light
        icon_color: >-
          {% if is_state('switch.ambilight_power', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true

      - type: custom:mushroom-template-card
        entity: switch.amplifier_power
        primary: Amplifier power
        secondary: >-
          {% if is_state('switch.amplifier_power', 'on') %}
            On
          {% else %}
            Off
          {% endif %}
        icon: mdi:audio-video
        icon_color: >-
          {% if is_state('switch.amplifier_power', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true

      - type: custom:mushroom-template-card
        entity: switch.plug_tv_switch
        primary: TV plug
        secondary: >-
          {% if is_state('switch.plug_tv_switch', 'on') %}
            Powered
          {% else %}
            Off
          {% endif %}
        icon: mdi:power-plug
        icon_color: >-
          {% if is_state('switch.plug_tv_switch', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true

      - type: custom:mushroom-template-card
        entity: switch.tv_json_cec
        primary: TV JSON CEC
        secondary: >-
          {% if is_state('switch.tv_json_cec', 'on') %}
            Enabled
          {% else %}
            Disabled
          {% endif %}
        icon: mdi:television
        icon_color: >-
          {% if is_state('switch.tv_json_cec', 'on') %}
            green
          {% else %}
            amber
          {% endif %}
        fill_container: true

  ###########################################################################
  # QUICK ACTIONS
  ###########################################################################
  - type: markdown
    content: |
      ## Quick actions

  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:button-card
        name: Turn On Receiver
        icon: mdi:power
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.turn_on_livingroom_receiver
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
            - background-color: rgba(255,255,255,0.06)
          name:
            - font-size: 0.85em
            - font-weight: 600
      - type: custom:button-card
        name: Turn Off Receiver
        icon: mdi:power-off
        tap_action:
          action: call-service
          service: button.press
