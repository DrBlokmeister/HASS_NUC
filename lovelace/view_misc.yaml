        default_zoom: 15
        hours_to_show: 24
        entities:
          - device_tracker.blokmeisterp9pro

      - type: entities
        title: Connectivity
        show_header_toggle: false
        entities:
          - entity: sensor.blokmeisterp9pro_geocoded_location
