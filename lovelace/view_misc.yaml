          - type: section
            label: Wi-Fi
          - entity: binary_sensor.blokmeisterp9pro_wi_fi_state
            name: Wi-Fi enabled
          - entity: sensor.blokmeisterp9pro_wi_fi_connection
            name: Wi-Fi SSID
          - entity: sensor.blokmeisterp9pro_wi_fi_signal_strength
            name: Wi-Fi signal (RSSI)
