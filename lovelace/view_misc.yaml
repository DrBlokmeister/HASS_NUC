  - type: vertical-stack
    cards:
      - type: entities
        title: Rolling Electricity Price Stats
        show_header_toggle: false
        entities:
          - entity: sensor.nordpool_energy_price_rolling_hour_15m
            name: Current Rolling 1h Price
          - entity: sensor.nordpool_rolling_1h_cheapest_day_price_10_18
            name: Rolling 1h Cheapest Day Price (10-18)
          - entity: sensor.nordpool_rolling_1h_cheapest_night_price
            name: Rolling 1h Cheapest Night Price
          - entity: sensor.nordpool_rolling_1h_max_price
            name: Rolling 1h Max Price
          - entity: sensor.nordpool_rolling_1h_min_price
            name: Rolling 1h Min Price
          - entity: sensor.nordpool_rolling_1h_q25_price
            name: Rolling 1h 25th Percentile
          - entity: sensor.nordpool_rolling_1h_q75_price
            name: Rolling 1h 75th Percentile
          - entity: sensor.nordpool_rolling_2h_cheapest_day_price_10_18
            name: Rolling 2h Cheapest Day Price (10-18)
          - entity: sensor.nordpool_rolling_2h_cheapest_night_price
            name: Rolling 2h Cheapest Night Price
          - entity: sensor.nordpool_rolling_2h_max_price
            name: Rolling 2h Max Price
          - entity: sensor.nordpool_rolling_2h_min_price
            name: Rolling 2h Min Price
          - entity: sensor.nordpool_rolling_2h_q25_price
            name: Rolling 2h 25th Percentile
          - entity: sensor.nordpool_rolling_2h_q75_price
            name: Rolling 2h 75th Percentile

      - type: custom:apexcharts-card
        graph_span: 24h
        span:
          start: day
        header:
          show: true
          title: Electricity Price Comparison Today
          show_states: true
          colorize_states: true
        now:
          show: true
          label: Now
        chart_type: line
        update_interval: 1m
        apex_config:
          chart:
            height: 260px
          legend:
            show: false
          grid:
            padding:
              left: 0
              right: 0
              top: 0
              bottom: 0
        yaxis:
          - id: price
            min: ~0.00
            max: ~0.50
            decimals: 3
            apex_config:
              tickAmount: 5
              forceNiceScale: true
        all_series_config:
          yaxis_id: price
          float_precision: 3
          unit: €/kWh
          transform: "return Math.round(x * 1000) / 1000;"
          show:
            legend_value: false
        series:
          - entity: sensor.nordpool_energy_price
            name: Nordpool 15m
            color: "#6FCF97"
            stroke_width: 2
            opacity: 0.55
            extend_to: false
            show:
              in_header: true
            data_generator: |
              const data = entity.attributes.raw_today || [];
              return data
                .filter((p) => p && p.start && p.value != null)
                .map((p) => [Date.parse(p.start), p.value]);
          - entity: sensor.nordpool_energy_price_rolling_hour_15m
            name: Rolling 1h
            color: "#F2C94C"
            stroke_width: 4
            extend_to: false
            show:
              in_header: true
            data_generator: |
              const data = entity.attributes.raw_today_rolling_hour_avg || [];
              return data
                .filter((p) => p && p.start && p.value != null)
                .map((p) => [Date.parse(p.start), p.value]);
          - entity: sensor.nordpool_energy_price_rolling_hour_15m
            name: Rolling 2h
            color: "#4A90E2"
            stroke_width: 3
            extend_to: false
            show:
              in_header: true
            data_generator: |
              const data = entity.attributes.raw_today_rolling_two_hour_avg || [];
              return data
                .filter((p) => p && p.start && p.value != null)
                .map((p) => [Date.parse(p.start), p.value]);
          - entity: sensor.nordpool_rolling_1h_q25_price
            name: 1h Q25
            color: "#D9A441"
            stroke_width: 2
            stroke_dash: 5
            opacity: 0.8
            extend_to: end
            show:
              in_header: false
          - entity: sensor.nordpool_rolling_1h_q75_price
            name: 1h Q75
            color: "#B88317"
            stroke_width: 2
            stroke_dash: 5
            opacity: 0.8
            extend_to: end
            show:
              in_header: false
          - entity: sensor.nordpool_rolling_2h_q25_price
            name: 2h Q25
            color: "#7FB3FF"
            stroke_width: 2
            stroke_dash: 7
            opacity: 0.75
            extend_to: end
            show:
              in_header: false
          - entity: sensor.nordpool_rolling_2h_q75_price
            name: 2h Q75
            color: "#2F6FB3"
            stroke_width: 2
            stroke_dash: 7
            opacity: 0.75
            extend_to: end
            show:
              in_header: false

      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.tomorrow_s_electricity_prices_available
            state: "on"
        card:
          type: custom:apexcharts-card
          graph_span: 24h
          span:
            start: day
            offset: +1d
          header:
            show: true
            title: Electricity Price Comparison Tomorrow
            show_states: true
            colorize_states: true
          now:
            show: true
          chart_type: line
          update_interval: 1m
          apex_config:
            chart:
              height: 260px
            legend:
              show: false
            grid:
              padding:
                left: 0
                right: 0
                top: 0
                bottom: 0
          yaxis:
            - id: price
              min: ~0.00
              max: ~0.50
              decimals: 3
              apex_config:
                tickAmount: 5
                forceNiceScale: true
          all_series_config:
            yaxis_id: price
            float_precision: 3
            unit: €/kWh
            transform: "return Math.round(x * 1000) / 1000;"
            show:
              legend_value: false

          series:
            - entity: sensor.nordpool_energy_price
              name: Nordpool 15m Tomorrow
              color: "#6FCF97"
              stroke_width: 2
              opacity: 0.55
              extend_to: false
              show:
                in_header: true
              data_generator: |
                const data = entity.attributes.raw_tomorrow || [];
                return data
                  .filter((p) => p && p.start && p.value != null)
                  .map((p) => [Date.parse(p.start), p.value]);

            - entity: sensor.nordpool_energy_price_rolling_hour_15m
              name: Rolling 1h Tomorrow
              color: "#F2C94C"
              stroke_width: 4
              extend_to: false
              show:
                in_header: true
              data_generator: |
                const data = entity.attributes.raw_tomorrow_rolling_hour_avg || [];
                return data
                  .filter((p) => p && p.start && p.value != null)
                  .map((p) => [Date.parse(p.start), p.value]);

            - entity: sensor.nordpool_energy_price_rolling_hour_15m
              name: Rolling 2h Tomorrow
              color: "#4A90E2"
              stroke_width: 3
              extend_to: false
              show:
                in_header: true
              data_generator: |
                const data =
                  entity.attributes.tomorrow_rolling_two_hour_avg ||
                  entity.attributes.raw_tomorrow_rolling_two_hour_avg ||
                  [];
                return data
                  .filter((p) => p && p.start && p.value != null)
                  .map((p) => [Date.parse(p.start), p.value]);

  - type: custom:tabbed-card
    options:
      defaultTabIndex: 0
    styles:
      --mdc-typography-button-font-size: 13px
      --mdc-tab-text-label-color-default: rgba(160, 160, 160, 0.9)
    attributes:
      minWidth: true
      isMinWidthIndicator: true
      stacked: false
    tabs:
      - attributes:
          label: Baby
          icon: mdi:baby-face-outline
        card:
          type: vertical-stack
          cards:
            - type: markdown
              content: >-
                [Open device page](/config/devices/device/567b1663e9dabc45bf197537adbab92c)

            - type: conditional
              conditions:
                - condition: state
                  entity: device_tracker.aqm_baby_room
                  state_not: home
              card:
                type: custom:mushroom-template-card
                entity: device_tracker.aqm_baby_room
                primary: AQM Baby Room offline
                secondary: Device tracker is not home
                icon: mdi:wifi-off
                icon_color: red
                fill_container: true

            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-template-card
                  entity: sensor.baby_room_aqm_temperature
                  primary: Temperature
                  secondary: >-
                    {% set v = states('sensor.baby_room_aqm_temperature') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      Unavailable
                    {% else %}
                      {{ v | float | round(1) }} °C
                    {% endif %}
                  icon: mdi:thermometer
                  icon_color: >-
                    {% set v = states('sensor.baby_room_aqm_temperature') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      grey
                    {% elif v | float >= 26 %}
                      red
                    {% elif v | float >= 23 %}
                      orange
                    {% else %}
                      blue
                    {% endif %}

                - type: custom:mushroom-template-card
                  entity: sensor.baby_room_aqm_humidity
                  primary: Humidity
                  secondary: >-
                    {% set v = states('sensor.baby_room_aqm_humidity') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      Unavailable
                    {% else %}
                      {{ v | float | round(0) }} %
                    {% endif %}
                  icon: mdi:water-percent
                  icon_color: >-
                    {% set v = states('sensor.baby_room_aqm_humidity') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      grey
                    {% elif v | float < 30 %}
                      orange
                    {% elif v | float > 60 %}
                      blue
                    {% else %}
                      green
                    {% endif %}

                - type: custom:mushroom-template-card
                  entity: sensor.baby_room_aqm_pressure
                  primary: Pressure
                  secondary: >-
                    {% set v = states('sensor.baby_room_aqm_pressure') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      Unavailable
                    {% else %}
                      {{ v | float | round(0) }} hPa
                    {% endif %}
                  icon: mdi:gauge
                  icon_color: >-
                    {% set v = states('sensor.baby_room_aqm_pressure') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      grey
                    {% else %}
                      cyan
                    {% endif %}

            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-template-card
                  entity: sensor.baby_room_co2
                  primary: CO₂
                  secondary: >-
                    {% set v = states('sensor.baby_room_co2') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      Unavailable
                    {% else %}
                      {{ v | float | round(0) }} ppm
                    {% endif %}
                  icon: mdi:molecule-co2
                  icon_color: >-
                    {% set v = states('sensor.baby_room_co2') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      grey
                    {% elif v | float >= 1200 %}
                      red
                    {% elif v | float >= 800 %}
                      orange
                    {% else %}
                      green
                    {% endif %}

                - type: custom:mushroom-template-card
                  entity: sensor.baby_room_eco2
                  primary: eCO₂
                  secondary: >-
                    {% set v = states('sensor.baby_room_eco2') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      Unavailable
                    {% else %}
                      {{ v | float | round(0) }} ppm
                    {% endif %}
                  icon: mdi:molecule
                  icon_color: >-
                    {% set v = states('sensor.baby_room_eco2') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      grey
                    {% elif v | float >= 1500 %}
                      red
                    {% elif v | float >= 800 %}
                      orange
                    {% else %}
                      green
                    {% endif %}

                - type: custom:mushroom-template-card
                  entity: sensor.baby_room_tvoc
                  primary: TVOC
                  secondary: >-
                    {% set v = states('sensor.baby_room_tvoc') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      Unavailable
                    {% else %}
                      {{ v | float | round(0) }} ppb
                    {% endif %}
                  icon: mdi:weather-windy
                  icon_color: >-
                    {% set v = states('sensor.baby_room_tvoc') %}
                    {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}
                      grey
