                              top: -10
                        yaxis:
                          - min: 0
                            max: 100
                            decimals: 0
                            align_to: 10
                            apex_config:
                              forceNiceScale: true
                        all_series_config:
                          group_by:
                            func: median
                            duration: 10min
                          fill_raw: last
                          stroke_width: 3
                          float_precision: 0
                          unit: "%"
                          show:
                            in_header: false
