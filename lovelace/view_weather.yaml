  - type: custom:apexcharts-card
    header:
      title: Room Illuminance
      show: true
      show_states: true
      colorize_states: true
    update_interval: 5min
    graph_span: 24h
    span:
      start: day
    apex_config:
      chart:
        height: 300px
        type: line
      legend:
        show: false
    now:
      show: true
    all_series_config:
      stroke_width: 3
      curve: smooth
      fill_raw: last
      extend_to: now
      group_by:
        func: avg
        duration: 10min
    yaxis:
      - show: true
        decimals: 0
        min: 1
        max: ~1000
        apex_config:
          tickAmount: 3
          forceNiceScale: true
          logarithmic: true
          logBase: 10
    series:
      - entity: sensor.entry_light_1
        name: Entry
        color: '#9cdb70' # More saturated green
        stroke_width: 4
        extend_to: now
      - entity: sensor.entry_light_1
        offset: '-1d'
        name: Entry Yesterday
        color: '#89c159'
        opacity: 0.5
        show:
          in_header: false
      - entity: sensor.hallway_1st_floor_light_1
        name: Hallway 1st Floor
        color: '#ffb3a7' # Richer coral
        stroke_width: 4
        extend_to: now
      - entity: sensor.hallway_1st_floor_light_1
        offset: '-1d'
        name: Hallway 1st Floor Yesterday
        color: '#ff9689'
        opacity: 0.5
        show:
          in_header: false
      - entity: sensor.hallway_2nd_floor_light_1
        name: Hallway 2nd Floor
        color: '#ff8da3' # Brighter pink
        stroke_width: 4
        extend_to: now
      - entity: sensor.hallway_2nd_floor_light_1
        offset: '-1d'
        name: Hallway 2nd Floor Yesterday
        color: '#ff7691'
        opacity: 0.5
        show:
          in_header: false
      - entity: sensor.study_light_1
        name: Study
        color: '#bf9cdf' # Deeper lavender
        stroke_width: 4
        extend_to: now
      - entity: sensor.study_light_1
        offset: '-1d'
        name: Study Yesterday
        color: '#ac85cf'
        opacity: 0.5
        show:
          in_header: false
      - entity: sensor.kitchen_light_1
        name: Kitchen
        color: '#82cfff' # More vivid blue
        stroke_width: 4
        extend_to: now
      - entity: sensor.kitchen_light_1
        offset: '-1d'
        name: Kitchen Yesterday
        color: '#70b9ff'
        opacity: 0.5
        show:
          in_header: false
      - entity: sensor.livingroom_light_1
        name: Living Room
        color: '#66ffba' # Brighter mint
        stroke_width: 4
        extend_to: now
      - entity: sensor.livingroom_light_1
        offset: '-1d'
        name: Living Room Yesterday
        color: '#52d9a4'
        opacity: 0.5
        show:
          in_header: false
      - entity: sensor.babyroom_light_1
        name: Baby Room
        color: '#ffad42' # Vivid orange
        stroke_width: 4
        extend_to: now
      - entity: sensor.babyroom_light_1
        offset: '-1d'
        name: Baby Room Yesterday
        color: '#e69537'
        opacity: 0.5
        show:
          in_header: false

  - type: custom:collapsable-cards
    title: Ventilation
    cards:
      - type: custom:apexcharts-card
        header:
          title: Ventilation
          show: true
          show_states: true
          colorize_states: true
        update_interval: 1m
        graph_span: 24h
        apex_config:
          chart:
            toolbar:
              show: false
            height: 250px
          legend:
            show: false
          grid:
            show: false
            padding:
              left: 0
              right: 0
              bottom: 0
              top: -20
          annotations:
            position: front
            yaxis:
              - y: 25
                borderColor: '#32CD32'
                label:
                  position: left
                  offsetY: -5
                  offsetX: 40
                  borderColor: '#32CD32'
                  text: '25%'
                  style:
                    background: '#1E1E1E'  # Dark background for dark theme
                    color: '#32CD32'
                    fontSize: '10px'
                    fontFamily: 'Helvetica, Arial, sans-serif'
              - y: 50
                borderColor: '#FFD700'
                label:
                  position: left
                  offsetX: 40
                  borderColor: '#FFD700'
                  text: '50%'
                  style:
                    background: '#1E1E1E'  # Dark background for dark theme
                    color: '#FFD700'
                    fontSize: '10px'
                    fontFamily: 'Helvetica, Arial, sans-serif'
              - y: 100
                borderColor: '#FF4500'
                label:
                  position: left
                  offsetX: 40
                  borderColor: '#FF4500'
                  text: '100%'
                  style:
                    background: '#1E1E1E'  # Dark background for dark theme
                    color: '#FF4500'
                    fontSize: '10px'
                    fontFamily: 'Helvetica, Arial, sans-serif'
        yaxis:
          - min: 0
            max: 100
            show: false
        layout: minimal
        all_series_config:
          type: area
          stroke_width: 3
          #fill_raw: zero
        series:
          - entity: fan.ventilation_system
            name: Home Ventilation
            attribute: percentage
            color: '#FFDD55'
            group_by:
              func: avg
              duration: 5min
          - entity: fan.ventilation_system
            name: Home Ventilation
            attribute: percentage
            color: '#FF6699'
            type: line
            stroke_width: 1
            group_by:
              func: max
              duration: 15min
            show:
              in_header: false

      - type: entities
        #title: Home Ventilation
        show_header_toggle: false
        state_color: true
        entities:
          - type: button
            name: Ventilation Controller
            icon: mdi:cog-outline
            tap_action:
              action: url
              url_path: http://10.0.0.252:8123/config/devices/device/209c2d1269e1d1cc27c0500352310ae1
          - type: section
            label: Current control
          - entity: sensor.fan_speed_setting
            name: Fan speed setting
            icon: mdi:fan-speed-3
          - type: custom:fold-entity-row
            head:
              entity: sensor.ventilation_determining_factor
              name: Determining factor
              icon: mdi:source-branch
            entities:
              - entity: sensor.ventilation_setting_bathroom_humidity
                name: Bathroom humidity
                icon: mdi:shower-head
              - entity: sensor.ventilation_setting_co2
                name: CO₂
                icon: mdi:molecule-co2
              - entity: sensor.ventilation_setting_humidity
                name: Humidity
                icon: mdi:water-percent

          - entity: number.co2_fan_sensitivity
            name: CO₂ sensitivity (%/ppm, 0.08 default)
            icon: mdi:tune-variant
          - entity: number.co2_offset
            name: CO₂ offset (600ppm default)
            icon: mdi:plus-minus-variant
          - type: section
            label: Manual override

          - entity: switch.fan_speed_override
            name: Override active
            icon: mdi:fan-alert
