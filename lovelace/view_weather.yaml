                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.study_aqm_temperature
                            offset: "-2d"
                            name: 2d ago
                            color: "#2ECC40"
                            opacity: 0.38
                          - entity: sensor.study_aqm_temperature
                            offset: "-1d"
                            name: Yesterday
                            color: "#2ECC40"
                            opacity: 0.55
