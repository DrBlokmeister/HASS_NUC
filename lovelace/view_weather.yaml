##########################################  HERE BEGINS THE WEATHER TAB  ##########################################
title: Weather
icon: 'mdi:weather-cloudy'
badges: []
cards:
  - type: vertical-stack
    cards:
      - type: weather-forecast
        name: Met.no Weather
        entity: weather.home
        forecast_type: hourly
      - type: picture-glance
        title: Buienradar
        camera_view: auto
        entities:
          - entity: weather.home_2
            attribute: temperature
            icon: mdi:thermometer
            suffix: '°C'
            show_state: true
          - entity: weather.home_2
            attribute: humidity
            icon: mdi:water-percent
            suffix: '%'
            show_state: true
          - entity: weather.home_2
            attribute: pressure
            suffix: ' mbar'
            icon: mdi:gauge
            show_state: true
          - entity: weather.home_2
            attribute: wind_speed
            icon: mdi:weather-windy
            show_state: true
            suffix: 'km/h'
        camera_image: camera.buienradar
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.rain_forecast
            state: 'on'
        card:
          type: custom:apexcharts-card
          graph_span: 2h
          span:
            start: minute
          header:
            title: Precipitation
            show: true
          update_interval: 5min
          apex_config:
            annotations:
              position: front
              yaxis:
                - y: 0.2
                  borderColor: '#00E396'  # Greenish color for low intensity
                  label:
                    borderColor: '#00E396'
                    text: 'Light'
                    style:
                      background: 'transparent'
                      color: '#00E396'  # Text color matches the line color
                      fontSize: '10px'
                      fontFamily: 'Helvetica, Arial, sans-serif'
                - y: 1
                  borderColor: '#FEB019'  # Amber color for medium intensity
                  label:
                    borderColor: '#FEB019'
                    text: 'Moderate'
                    style:
                      background: 'transparent'
                      color: '#FEB019'
                      fontSize: '10px'
                      fontFamily: 'Helvetica, Arial, sans-serif'
                - y: 2.5
                  borderColor: '#FF4560'  # Red color for high intensity
                  label:
                    borderColor: '#FF4560'
                    text: 'Heavy'
                    style:
                      background: 'transparent'
                      color: '#FF4560'
                      fontSize: '10px'
                      fontFamily: 'Helvetica, Arial, sans-serif'
          yaxis:
            - min: 0
              max: ~3
              apex_config:
                tickAmount: 1
          series:
            - entity: sensor.precipitation_forecast
              float_precision: 1
              type: area
              color: '#87ceeb'
              data_generator: |
                console.log(entity.attributes.precipitation_raw.map(item => [new Date(item.datetime).getTime(), item.precipitation]));
                return entity.attributes.precipitation_raw.map(item => {
                  return [new Date(item.datetime).getTime(), item.precipitation];
                });
      - type: 'custom:apexcharts-card'
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        header:
          title: Temperature Forecast
          show: true
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 300px
            type: line
          legend:
            show: false
        yaxis:
          - show: true
            decimals: 0
            min: ~10
            max: ~20
            align_to: 5
            apex_config:
              # tickAmount: 5
              # forceNiceScale: true
              labels:
                offsetX: -15
        all_series_config:
          stroke_width: 3
          curve: smooth
          fill_raw: last
        series:
          - entity: sensor.weather_forecast_hourly
            name: Forecast Now to Day End
            float_precision: 1
            type: line
            color: '#e69537'
            data_generator: |
              return entity.attributes.forecast.map(item => {
                return [new Date(item.datetime).getTime(), item.temperature];
              });
            show:
              in_header: false
          - entity: sensor.weather_forecast_hourly
            name: Forecast Tomorrow
            float_precision: 1
            offset: '+1d'
            type: line
            extend_to: now
            color: '#e69537'
            data_generator: |
              return entity.attributes.forecast.map(item => {
                return [new Date(item.datetime).getTime(), item.temperature];
              });
            opacity: 0.5
            show:
              in_header: false
          - entity: sensor.weather_forecast_hourly
            name: Forecast Current Temp
            float_precision: 1
            type: line
            color: '#ffad42'
            extend_to: now
            show:
              in_header: true
          - entity: sensor.shed_aqm_temperature
            name: Shed AQM
            color: '#33ff63'
            extend_to: now
            group_by:
              func: median
              duration: 10min
          - entity: sensor.temperature_outside
            name: Outside
            color: '#33FFFF'
            extend_to: now
            group_by:
              func: median
              duration: 10min

  - type: vertical-stack
    cards:
