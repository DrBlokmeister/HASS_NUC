        cards:
          - type: custom:mushroom-template-card
            entity: sensor.bedroom_co2
            primary: Bedroom
            secondary: >-
              {%- set v = states('sensor.bedroom_co2') -%}
              {%- if v in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- else -%}
                {{ v | float(0) | round(0) | int }} ppm
              {%- endif -%}
            icon: mdi:bed
            icon_color: >-
              {%- set v = states('sensor.bedroom_co2') -%}
              {%- set co2 = v | float(0) -%}
              {%- if v in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                grey
              {%- elif co2 < 700 -%}
                green
              {%- elif co2 < 900 -%}
                yellow
              {%- elif co2 < 1200 -%}
                orange
              {%- else -%}
                red
              {%- endif -%}
            tap_action:
