                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.living_room_aqm_humidity
                            offset: "-3d"
                            name: AQM 3d ago
                            color: "#7E57C2"
                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.humidity_livingroom
                            offset: "-2d"
                            name: Living 2d ago
                            color: "#26A69A"
                            opacity: 0.38
                          - entity: sensor.living_room_aqm_humidity
                            offset: "-2d"
                            name: AQM 2d ago
                            color: "#7E57C2"
                            opacity: 0.38
                          - entity: sensor.humidity_livingroom
                            offset: "-1d"
                            name: Living yesterday
                            color: "#26A69A"
                            opacity: 0.55
                          - entity: sensor.living_room_aqm_humidity
                            offset: "-1d"
                            name: AQM yesterday
                            color: "#7E57C2"
                            opacity: 0.55
                          - entity: sensor.humidity_livingroom
                            name: Living
                            color: "#26A69A"
                            opacity: 1
                            stroke_width: 4
                            extend_to: now
                            show:
                              in_header: true
                              legend_value: true
                          - entity: sensor.living_room_aqm_humidity
                            name: Living AQM
                            color: "#7E57C2"
                            opacity: 1
                            stroke_width: 4
                            extend_to: now
                            show:
                              in_header: true
                              legend_value: true
            hold_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  min-height: 72px;
                  --icon-size: 30px;
                }

