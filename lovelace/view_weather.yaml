##########################################  HERE BEGINS THE WEATHER TAB  ##########################################
title: Weather
icon: 'mdi:weather-cloudy'
badges: []
cards:
  - type: vertical-stack
    cards:
      - type: weather-forecast
        name: Met.no Weather
        entity: weather.home
        forecast_type: hourly
      - type: picture-glance
        title: Buienradar
        camera_view: auto
        entities:
          - entity: weather.home_2
            attribute: temperature
            icon: mdi:thermometer
            suffix: '°C'
            show_state: true
          - entity: weather.home_2
            attribute: humidity
            icon: mdi:water-percent
            suffix: '%'
            show_state: true
          - entity: weather.home_2
            attribute: pressure
            suffix: ' mbar'
            icon: mdi:gauge
            show_state: true
          - entity: weather.home_2
            attribute: wind_speed
            icon: mdi:weather-windy
            show_state: true
            suffix: 'km/h'
        camera_image: camera.buienradar
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.rain_forecast
            state: 'on'
        card:
          type: custom:apexcharts-card
          graph_span: 2h
          span:
            start: minute
          header:
            title: Precipitation
            show: true
          update_interval: 5min
          apex_config:
            annotations:
              position: front
              yaxis:
                - y: 0.2
                  borderColor: '#00E396'  # Greenish color for low intensity
                  label:
                    borderColor: '#00E396'
                    text: 'Light'
                    style:
                      background: 'transparent'
                      color: '#00E396'  # Text color matches the line color
                      fontSize: '10px'
                      fontFamily: 'Helvetica, Arial, sans-serif'
                - y: 1
                  borderColor: '#FEB019'  # Amber color for medium intensity
                  label:
                    borderColor: '#FEB019'
                    text: 'Moderate'
                    style:
                      background: 'transparent'
                      color: '#FEB019'
                      fontSize: '10px'
                      fontFamily: 'Helvetica, Arial, sans-serif'
                - y: 2.5
                  borderColor: '#FF4560'  # Red color for high intensity
                  label:
                    borderColor: '#FF4560'
                    text: 'Heavy'
                    style:
                      background: 'transparent'
                      color: '#FF4560'
                      fontSize: '10px'
                      fontFamily: 'Helvetica, Arial, sans-serif'
          yaxis:
            - min: 0
              max: ~3
              apex_config:
                tickAmount: 1
          series:
            - entity: sensor.precipitation_forecast
              float_precision: 1
              type: area
              color: '#87ceeb'
              data_generator: |
                console.log(entity.attributes.precipitation_raw.map(item => [new Date(item.datetime).getTime(), item.precipitation]));
                return entity.attributes.precipitation_raw.map(item => {
                  return [new Date(item.datetime).getTime(), item.precipitation];
                });
      - type: 'custom:apexcharts-card'
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        header:
          title: Temperature Forecast
          show: true
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 300px
            type: line
          legend:
            show: false
        yaxis:
          - show: true
            decimals: 0
            min: ~10
            max: ~20
            align_to: 5
            apex_config:
              # tickAmount: 5
              # forceNiceScale: true
              labels:
                offsetX: -15
        all_series_config:
          stroke_width: 3
          curve: smooth
          fill_raw: last
        series:
          - entity: sensor.weather_forecast_hourly
            name: Forecast Now to Day End
            float_precision: 1
            type: line
            color: '#e69537'
            data_generator: |
              return entity.attributes.forecast.map(item => {
                return [new Date(item.datetime).getTime(), item.temperature];
              });
            show:
              in_header: false
          - entity: sensor.weather_forecast_hourly
            name: Forecast Tomorrow
            float_precision: 1
            offset: '+1d'
            type: line
            extend_to: now
            color: '#e69537'
            data_generator: |
              return entity.attributes.forecast.map(item => {
                return [new Date(item.datetime).getTime(), item.temperature];
              });
            opacity: 0.5
            show:
              in_header: false
          - entity: sensor.weather_forecast_hourly
            name: Forecast Current Temp
            float_precision: 1
            type: line
            color: '#ffad42'
            extend_to: now
            show:
              in_header: true
          - entity: sensor.shed_aqm_temperature
            name: Shed AQM
            color: '#33ff63'
            extend_to: now
            group_by:
              func: median
              duration: 10min
          - entity: sensor.temperature_outside
            name: Outside
            color: '#33FFFF'
            extend_to: now
            group_by:
              func: median
              duration: 10min

  - type: vertical-stack
    cards:
      - type: grid
        columns: 3
        square: false
        card_mod:
          style: |
            #root {
              gap: 4px !important;
            }
        cards:
          - type: custom:decluttering-card
            template: co2_pop_up_grid_card
            variables:
              - title: Bedroom CO2
              - entity_id: sensor.bedroom_co2
          - type: custom:decluttering-card
            template: co2_pop_up_grid_card
            variables:
              - title: Study CO2
              - entity_id: sensor.study_co2
          - type: custom:decluttering-card
            template: co2_pop_up_grid_card
            variables:
              - title: Living Room CO2
              - entity_id: sensor.living_room_co2
          - type: custom:decluttering-card
            template: co2_pop_up_grid_card
            variables:
              - title: Shed CO2
              - entity_id: sensor.shed_co2
          - type: custom:decluttering-card
            template: co2_pop_up_grid_card
            variables:
              - title: Baby Room CO2
              - entity_id: sensor.baby_room_co2
          - type: custom:decluttering-card
            template: co2_pop_up_grid_card
            variables:
              - title: Guest Room CO2
              - entity_id: sensor.guest_room_co2

      - type: grid
        title: Room Temperatures
        columns: 3
        square: false
        card_mod:
          style: |
            #root {
              gap: 6px !important;
            }
        cards:
          ###########################################################################
          # LIVING ROOM
          ###########################################################################
          - type: custom:mushroom-template-card
            entity: sensor.living_room_aqm_temperature
            primary: Living Room
            secondary: >-
              {%- set temp_ents = [
                'sensor.temperature_livingroom',
                'sensor.living_room_aqm_temperature'
              ] -%}
              {%- set hum_ents = [
                'sensor.humidity_livingroom',
                'sensor.living_room_aqm_humidity'
              ] -%}
              {%- set temps = temp_ents
                | map('states')
                | reject('in', ['unknown', 'unavailable', 'none', 'None', ''])
                | map('float')
                | list -%}
              {%- set hums = hum_ents
                | map('states')
                | reject('in', ['unknown', 'unavailable', 'none', 'None', ''])
                | map('float')
                | list -%}
              {%- if temps | count == 0 -%}
                Temp unavailable
              {%- else -%}
                {{ (temps | sum / temps | count) | round(1) }} °C
              {%- endif -%}
              {%- if hums | count > 0 %}
              {{ (hums | sum / hums | count) | round(0) | int }}% RH
              {%- endif -%}
            icon: mdi:sofa
            icon_color: >-
              {%- set vals = [
                states('sensor.temperature_livingroom'),
                states('sensor.living_room_aqm_temperature')
              ] | reject('in', ['unknown', 'unavailable', 'none', 'None', '']) | map('float') | list -%}
              {%- if vals | count == 0 -%}
                grey
              {%- else -%}
                {%- set avg = vals | sum / vals | count -%}
                {%- if avg >= 27 -%}
                  red
                {%- elif avg >= 24 -%}
                  orange
                {%- elif avg >= 20 -%}
                  green
                {%- elif avg >= 18 -%}
                  blue
                {%- else -%}
                  indigo
                {%- endif -%}
              {%- endif -%}
            multiline_secondary: true
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Living Room climate
                  content:
                    type: vertical-stack
                    cards:
                      - type: custom:apexcharts-card
                        header:
                          title: Living Room temperature · today vs last 4 days
                          show: true
                          show_states: true
                          colorize_states: true
                        update_interval: 1min
                        graph_span: 24h
                        span:
                          start: day
                        now:
                          show: true
                        apex_config:
                          chart:
                            height: 260px
                          legend:
                            show: false
                          grid:
                            show: true
                            padding:
                              left: 0
                              right: 0
                              bottom: 0
                              top: -10
                        yaxis:
                          - min: ~15
                            max: ~30
                            decimals: 1
                            align_to: 1
                            apex_config:
                              forceNiceScale: true
                        all_series_config:
                          group_by:
                            func: median
                            duration: 10min
                          fill_raw: last
                          stroke_width: 3
                          float_precision: 1
                          unit: °C
                          show:
                            in_header: false
                            legend_value: false
                            name_in_header: false
                        series:
                          - entity: sensor.temperature_livingroom
                            offset: "-4d"
                            name: Living 4d ago
                            color: "#FF9800"
                            opacity: 0.20
                            stroke_width: 2
                          - entity: sensor.living_room_aqm_temperature
                            offset: "-4d"
                            name: AQM 4d ago
                            color: "#03A9F4"
                            opacity: 0.20
                            stroke_width: 2
                          - entity: sensor.temperature_livingroom
                            offset: "-3d"
                            name: Living 3d ago
                            color: "#FF9800"
                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.living_room_aqm_temperature
                            offset: "-3d"
                            name: AQM 3d ago
                            color: "#03A9F4"
                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.temperature_livingroom
                            offset: "-2d"
                            name: Living 2d ago
                            color: "#FF9800"
                            opacity: 0.38
                          - entity: sensor.living_room_aqm_temperature
                            offset: "-2d"
                            name: AQM 2d ago
                            color: "#03A9F4"
                            opacity: 0.38
                          - entity: sensor.temperature_livingroom
                            offset: "-1d"
                            name: Living yesterday
                            color: "#FF9800"
                            opacity: 0.55
                          - entity: sensor.living_room_aqm_temperature
                            offset: "-1d"
                            name: AQM yesterday
                            color: "#03A9F4"
                            opacity: 0.55
                          - entity: sensor.temperature_livingroom
                            name: Living
                            color: "#FF9800"
                            opacity: 1
                            stroke_width: 4
                            extend_to: now
                            show:
                              in_header: true
                              legend_value: true
                          - entity: sensor.living_room_aqm_temperature
                            name: Living AQM
                            color: "#03A9F4"
                            opacity: 1
                            stroke_width: 4
                            extend_to: now
                            show:
                              in_header: true
                              legend_value: true

                      - type: custom:apexcharts-card
