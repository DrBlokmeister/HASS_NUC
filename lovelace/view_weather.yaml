                            name_in_header: false
                        series:
                          - entity: sensor.study_multi_sensor_2_humidity
                            offset: "-4d"
                            name: Study down 4d ago
                            color: "#26A69A"
                            opacity: 0.20
                            stroke_width: 2
                          - entity: sensor.study_aqm_humidity
                            offset: "-4d"
                            name: AQM 4d ago
                            color: "#7E57C2"
                            opacity: 0.20
                            stroke_width: 2
                          - entity: sensor.study_multi_sensor_2_humidity
                            offset: "-3d"
                            name: Study down 3d ago
                            color: "#26A69A"
                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.study_aqm_humidity
                            offset: "-3d"
                            name: AQM 3d ago
                            color: "#7E57C2"
                            opacity: 0.28
                            stroke_width: 2
                          - entity: sensor.study_multi_sensor_2_humidity
                            offset: "-2d"
                            name: Study down 2d ago
                            color: "#26A69A"
                            opacity: 0.38
                          - entity: sensor.study_aqm_humidity
                            offset: "-2d"
                            name: AQM 2d ago
