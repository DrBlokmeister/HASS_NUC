# PM2.5 grid with per-room 4-day popup
  - type: vertical-stack
    cards:
      - type: custom:mushroom-title-card
        title: PM2.5 Concentrations
        subtitle: Tap a room for a 4-day PM2.5 overlay
        alignment: center
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.bedroom_pm_2_5_concentration
            primary: Bedroom
            secondary: >-
              {%- set raw = states('sensor.bedroom_pm_2_5_concentration') -%}
              {%- set pm = raw | float(0) -%}
              {%- if raw in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- elif pm < 5 -%}
                {{ pm | round(1) }} µg/m³ · excellent
              {%- elif pm < 10 -%}
                {{ pm | round(1) }} µg/m³ · good
              {%- elif pm < 25 -%}
                {{ pm | round(1) }} µg/m³ · okay
              {%- else -%}
                {{ pm | round(1) }} µg/m³ · high
              {%- endif -%}
            icon: mdi:bed-king-outline
