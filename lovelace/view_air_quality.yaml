##########################################  HERE BEGINS THE AIR QUALITY TAB  ##########################################
title: Air Quality
icon: "mdi:air-purifier"
badges: []
cards:
  - type: vertical-stack
    cards:
      - type: custom:mushroom-title-card
        title: CO₂ Concentrations
        subtitle: Tap a room for a 4-day overlay
        alignment: center
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.bedroom_co2
            primary: Bedroom
            secondary: >-
              {%- set raw = states('sensor.bedroom_co2') -%}
              {%- set co2 = raw | float(0) -%}
              {%- if raw in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- elif co2 < 800 -%}
                {{ co2 | round(0) }} ppm · good
              {%- elif co2 < 1000 -%}
                {{ co2 | round(0) }} ppm · okay
              {%- elif co2 < 1400 -%}
                {{ co2 | round(0) }} ppm · ventilate
              {%- else -%}
                {{ co2 | round(0) }} ppm · high
              {%- endif -%}
            icon: mdi:bed-king-outline
            icon_color: >-
              {%- set raw = states('sensor.bedroom_co2') -%}
              {%- set co2 = raw | float(0) -%}
              {%- if raw in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                grey
              {%- elif co2 < 800 -%}
                green
              {%- elif co2 < 1000 -%}
                amber
              {%- elif co2 < 1400 -%}
                orange
              {%- else -%}
                red
              {%- endif -%}
            fill_container: true
            multiline_secondary: true
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Bedroom CO₂
                  content:
                    type: custom:apexcharts-card
                    graph_span: 24h
                    span:
                      start: day
                    header:
                      show: true
                      title: Bedroom CO₂ - past 4 days
                      show_states: true
                      colorize_states: true
                    now:
                      show: true
                    chart_type: line
                    update_interval: 1m
                    apex_config:
                      chart:
                        height: 300px
                      legend:
                        show: false
                      grid:
                        borderColor: rgba(255, 255, 255, 0.08)
                      tooltip:
                        shared: true
                    yaxis:
                      - min: 400
                        max: ~1000
                        decimals: 0
                        align_to: 200
                        apex_config:
                          tickAmount: 4
                          forceNiceScale: true
                    all_series_config:
                      stroke_width: 3
                      float_precision: 0
                      transform: "return Math.round(x);"
                      unit: ppm
                      fill_raw: last
                      group_by:
                        func: avg
                        duration: 15min
                      show:
                        in_header: false
                        legend_value: false
                        name_in_header: false
                    series:
                      - entity: sensor.bedroom_co2
                        offset: "-3d"
                        name: 3 Days Ago
                        color: "#9E9E9E"
                        opacity: 0.18
                      - entity: sensor.bedroom_co2
                        offset: "-2d"
                        name: 2 Days Ago
                        color: "#B0B0B0"
                        opacity: 0.28
                      - entity: sensor.bedroom_co2
                        offset: "-1d"
                        name: Yesterday
                        color: "#C7C7C7"
                        opacity: 0.45
                      - entity: sensor.bedroom_co2
                        name: Today
                        color: "#4682B4"
                        opacity: 1
                        stroke_width: 4
                        extend_to: now
                        show:
                          in_header: true
                          legend_value: true
            hold_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  min-height: 82px;
                  border-radius: 18px;
                  border: 1px solid rgba(255, 255, 255, 0.08);
                  background: linear-gradient(135deg, rgba(var(--rgb-card-background-color), 0.94), rgba(var(--rgb-card-background-color), 0.68));
                }
                mushroom-shape-icon {
                  --shape-color: rgba(255, 255, 255, 0.08) !important;
                }
