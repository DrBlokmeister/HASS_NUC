  - type: custom:collapsable-cards
    title: AirVPN
    cards:
      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.airvpn_connected_since
            primary: Connected since
            secondary: >-
              {%- set s = states('sensor.airvpn_connected_since') -%}
              {%- if s in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- else -%}
                {{ relative_time(as_datetime(s)) }} ago
              {%- endif -%}
            icon: mdi:clock-outline
            icon_color: blue
            fill_container: true
          - type: custom:mushroom-template-card
            entity: sensor.airvpn_server_name
            primary: Server
            secondary: >-
              {{ states('sensor.airvpn_server_name') }} · {{ states('sensor.airvpn_server_country') }}
            icon: mdi:earth
            icon_color: teal
            fill_container: true
          - type: custom:mushroom-template-card
            entity: sensor.airvpn_exit_ip
            primary: Exit / VPN IP
            secondary: >-
              {{ states('sensor.airvpn_exit_ip') }} · {{ states('sensor.airvpn_vpn_ip') }}
            icon: mdi:ip-network-outline
            icon_color: cyan
            multiline_secondary: true
            fill_container: true
          - type: custom:mushroom-template-card
            entity: sensor.airvpn_total_download
            primary: Total transfer
            secondary: >-
              ↓ {{ states('sensor.airvpn_total_download') }} · ↑ {{ states('sensor.airvpn_total_upload') }}
            icon: mdi:swap-vertical
            icon_color: green
            fill_container: true

      - type: custom:apexcharts-card
        header:
          title: AirVPN bandwidth
          show: true
          show_states: true
          colorize_states: true
        update_interval: 5min
        graph_span: 24h
        apex_config:
          chart:
            height: 250px
          legend:
            show: false
        all_series_config:
          group_by:
            func: max
            duration: 10min
          stroke_width: 3
        yaxis:
          - min: 0
            max: auto
            decimals: 0
            apex_config:
              forceNiceScale: true
              labels:
                formatter: |
                  EVAL:function(value) {
                    return `${value} MiB/s`;
                  }
        series:
          - entity: sensor.airvpn_download_speed
            name: Download
            color: '#1E88E5'
            transform: 'return x / 1048576;'
          - entity: sensor.airvpn_upload_speed
            name: Upload
            color: '#43A047'
            transform: 'return x / 1048576;'

