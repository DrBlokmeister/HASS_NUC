                red
              {%- else -%}
                grey
              {%- endif -%}
            fill_container: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.pikvm_nas_link_quality
            primary: Link quality
            secondary: >-
              {%- set quality = states('sensor.pikvm_nas_link_quality') -%}
              {%- if quality in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- else -%}
                {{ quality | float(0) | round(0) }} %
              {%- endif -%}
            icon: mdi:wifi-check
