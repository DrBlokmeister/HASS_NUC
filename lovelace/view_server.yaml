  ###########################################################################
  # SYSTEM CHARTS
  ###########################################################################
  - type: markdown
    content: |
      ## System charts

  - type: custom:apexcharts-card
    header:
      title: NAS CPU Stats
      show: true
      show_states: true
      colorize_states: true
    update_interval: 5min
    graph_span: 24h
    apex_config:
      chart:
        height: 250px
      legend:
        show: false
    all_series_config:
      group_by:
        func: median
        duration: 10min
      stroke_width: 3
    yaxis:
      - id: percent
        min: 0
        max: 100
        decimals: 0
        align_to: 10
        apex_config:
          forceNiceScale: true
          labels:
            formatter: |
              EVAL:function(value) {
                return `${value} %`;
              }
      - id: temp
        min: 20
        max: 80
        decimals: 0
        opposite: true
        apex_config:
          forceNiceScale: true
          labels:
            formatter: |
              EVAL:function(value) {
                return `${value} °C`;
              }
    series:
      - entity: sensor.tower_cpu_usage
        name: CPU Usage
        yaxis_id: percent
        color: '#36A2EB'
      - entity: sensor.tower_cpu_temperature
        name: CPU Temperature
        yaxis_id: temp
        color: '#FFCE56'
      - entity: sensor.nas_exhaust_multi_sensor_temperature
        name: Exhaust Temperature
        yaxis_id: temp
        color: '#FF6384'

  - type: custom:apexcharts-card
    header:
      title: NAS Memory Usage
      show: true
      show_states: true
      colorize_states: true
    update_interval: 5min
    graph_span: 24h
    apex_config:
      chart:
        height: 250px
      legend:
        show: false
    all_series_config:
      group_by:
        func: median
        duration: 10min
      stroke_width: 3
    yaxis:
      - min: 0
        max: 100
        decimals: 0
        apex_config:
          forceNiceScale: true
          tickAmount: 4
          labels:
            formatter: |
              EVAL:function(value) {
                return `${value} %`;
              }
    series:
      - entity: sensor.tower_ram_usage
        name: Used Memory
        color: '#FF9F40'

  - type: custom:apexcharts-card
    header:
      title: NAS Disk Temperatures
      show: true
      show_states: true
      colorize_states: true
    update_interval: 5min
    graph_span: 24h
    apex_config:
      chart:
        height: 350px
      legend:
        show: false
    all_series_config:
      group_by:
        func: median
        duration: 5min
      stroke_width: 3
      transform: "return x == -1 ? null : x;"
    yaxis:
      - min: 20
        max: 50
        decimals: 0
        align_to: 10
        apex_config:
          forceNiceScale: true
          labels:
            formatter: |
              EVAL:function(value) {
                return `${value} °C`;
              }
    series:
      - entity: sensor.tower_disk_parity_temperature
        name: Parity Disk Temperature
        color: '#4BC0C0'
      - entity: sensor.tower_disk_disk1_temperature
        name: Disk 1 Temperature
        color: '#9966FF'
      - entity: sensor.tower_disk_disk2_temperature
        name: Disk 2 Temperature
        color: '#C9CBCF'
      - entity: sensor.tower_disk_disk3_temperature
        name: Disk 3 Temperature
        color: '#7E57C2'
      - entity: sensor.tower_disk_disk4_temperature
        name: Disk 4 Temperature
        color: '#FFCE56'
      - entity: sensor.tower_disk_disk5_temperature
        name: Disk 5 Temperature
        color: '#FF9F40'
      - entity: sensor.tower_disk_cache_temperature
        name: Cache Temperature
        color: '#36A2EB'
      - entity: sensor.nas_exhaust_multi_sensor_temperature
        name: Exhaust Temperature
        color: '#FF6384'

  - type: custom:apexcharts-card
    header:
      title: NAS Power
      show: true
      show_states: true
      colorize_states: true
    update_interval: 5min
    graph_span: 24h
    span:
      start: day
    now:
      show: true
    apex_config:
      chart:
        height: 350px
      legend:
        show: false
    all_series_config:
      group_by:
        func: avg
        duration: 5min
      stroke_width: 3
      show:
        in_header: false
        legend_value: false
        name_in_header: false
    yaxis:
      - min: 0
        max: ~80
        decimals: 0
        align_to: 20
        apex_config:
          forceNiceScale: true
    series:
      - entity: sensor.plug_nas_power
        offset: '-6d'
        name: 6 Days Ago
        color: '#DD2C00'
        opacity: 0.2
      - entity: sensor.plug_nas_power
        offset: '-5d'
        name: 5 Days Ago
        color: '#E65100'
        opacity: 0.25
      - entity: sensor.plug_nas_power
        offset: '-4d'
        name: 4 Days Ago
        color: '#EF6C00'
        opacity: 0.3
      - entity: sensor.plug_nas_power
        offset: '-3d'
        name: 3 Days Ago
        color: '#F57C00'
        opacity: 0.35
      - entity: sensor.plug_nas_power
        offset: '-2d'
        name: 2 Days Ago
        color: '#FB8C00'
        opacity: 0.4
      - entity: sensor.plug_nas_power
        offset: '-1d'
        name: Yesterday
        color: '#FFA726'
        opacity: 0.45
      - entity: sensor.plug_nas_power
        name: Power
        color: '#FFCE56'
        type: line
        extend_to: now
        opacity: 1
        show:
          in_header: true
          legend_value: true

  ###########################################################################
  # UPS
  ###########################################################################
  - type: custom:collapsable-cards
    title: UPS
    cards:
      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            entity: binary_sensor.tower_ups_connected
            primary: UPS connection
            secondary: >-
              {% set s = states('binary_sensor.tower_ups_connected') %}
              {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
                Unavailable
              {% elif s == 'on' %}
                Connected · {{ state_attr('binary_sensor.tower_ups_connected', 'status') }}
              {% else %}
                Disconnected
              {% endif %}
            icon: mdi:battery-charging
            icon_color: >-
              {% set s = states('binary_sensor.tower_ups_connected') %}
              {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
                disabled
              {% elif s == 'on' %}
                green
              {% else %}
                red
              {% endif %}
            fill_container: true

          - type: custom:mushroom-template-card
            entity: sensor.tower_ups_battery
            primary: Battery
            secondary: >-
              {% set s = states('sensor.tower_ups_battery') %}
              {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
                Unavailable
              {% else %}
                {{ s }}% · {{ state_attr('sensor.tower_ups_battery', 'health') }}
              {% endif %}
            icon: mdi:battery-high
            icon_color: >-
              {% set s = states('sensor.tower_ups_battery') %}
              {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
                disabled
              {% elif s | int(0) <= 25 %}
                red
              {% elif s | int(0) <= 50 %}
                amber
              {% else %}
                green
              {% endif %}
            fill_container: true

          - type: custom:mushroom-template-card
            entity: sensor.tower_ups_load
            primary: Load
            secondary: >-
              {% set s = states('sensor.tower_ups_load') %}
              {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
                Unavailable
              {% else %}
                {{ s }}%
              {% endif %}
            icon: mdi:gauge
            icon_color: >-
              {% set s = states('sensor.tower_ups_load') %}
              {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
                disabled
              {% elif s | float(0) >= 80 %}
                red
              {% elif s | float(0) >= 50 %}
                amber
              {% else %}
                green
              {% endif %}
            fill_container: true

          - type: custom:mushroom-template-card
            entity: sensor.tower_ups_power
            primary: Output power
            secondary: >-
              {% if states('sensor.tower_ups_power') in ['unknown', 'unavailable', 'none', 'None', ''] %}
                Unavailable
              {% else %}
