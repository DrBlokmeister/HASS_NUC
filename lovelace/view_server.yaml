            icon_color: >-
              {%- set temp_state = states('sensor.pikvm_nas_cpu_temp') -%}
              {%- set temp = temp_state | float(0) -%}
              {%- if temp_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                grey
              {%- elif temp >= 75 -%}
                red
              {%- elif temp >= 65 -%}
                amber
              {%- else -%}
                green
              {%- endif -%}
            fill_container: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.pikvm_nas_signal_level
            primary: Signal level
            secondary: >-
              {%- set signal = states('sensor.pikvm_nas_signal_level') -%}
              {%- if signal in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- else -%}
                {{ signal | float(0) | round(0) }}
              {%- endif -%}
            icon: mdi:wifi-strength-3
            icon_color: >-
              {%- set signal_state = states('sensor.pikvm_nas_signal_level') -%}
              {%- set signal = signal_state | float(0) -%}
              {%- if signal_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                grey
              {%- elif signal >= 60 -%}
                green
              {%- elif signal >= 40 -%}
                amber
              {%- else -%}
                red
              {%- endif -%}
            fill_container: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
