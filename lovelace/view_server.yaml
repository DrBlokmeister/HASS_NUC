      - type: custom:apexcharts-card
        header:
          title: Containers CPU Usage
          show: true
          show_states: true
          colorize_states: true
        update_interval: 5min
        graph_span: 24h
        apex_config:
          chart:
            height: 350px
          legend:
            show: false
        all_series_config:
          group_by:
            func: avg
            duration: 10min
          stroke_width: 3
          transform: |
            EVAL:return (isNaN(x) ? 0 : x);
        yaxis:
          - min: 0
            max: ~100
            align_to: 25
            decimals: 0
            apex_config:
              forceNiceScale: false
              tickAmount: 5
              labels:
                formatter: |
                  EVAL:function(value) {
                    return `${value} %`;
                  }
        series:
          - entity: sensor.docker_tower_apacheguacamole_cpu
            name: Apache Guacamole
            color: '#4E79A7'
          - entity: sensor.docker_tower_audiobookshelf_cpu
            name: Audiobookshelf
            color: '#A0CBE8'
          - entity: sensor.docker_tower_diskspeed_cpu
            name: Disk Speed
            color: '#F28E2B'
          - entity: sensor.docker_tower_dupeguru_cpu
            name: DupeGuru
            color: '#FFBE7D'
          - entity: sensor.docker_tower_firefox_cpu
            name: Firefox
            color: '#59A14F'
          - entity: sensor.docker_tower_frigate_cpu
            name: Frigate
            color: '#8CD17D'
          - entity: sensor.docker_tower_hddtemp_cpu
            name: HDD Temp
            color: '#B6992D'
          - entity: sensor.docker_tower_immich_cpu
            name: Immich
            color: '#F1CE63'
          - entity: sensor.docker_tower_iperf3_cpu
            name: iPerf3
            color: '#499894'
          - entity: sensor.docker_tower_ntp_cpu
            name: NTP
            color: '#86BCB6'
          - entity: sensor.docker_tower_onedrive_cpu
            name: OneDrive
            color: '#E15759'
          - entity: sensor.docker_tower_photoprism_cpu
            name: PhotoPrism
            color: '#FF9D9A'
          - entity: sensor.docker_tower_plex_cpu
