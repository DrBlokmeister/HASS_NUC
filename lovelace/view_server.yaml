##########################################  HERE BEGINS THE SERVER TAB  ##########################################
# Reworked for stronger failure visibility, cleaner grouping, and better accessibility.
# Notes:
# - This keeps the existing remote backup / AirVPN / PiKVM / firewall / desk powerstrip sections.
# - The monitor_docker CPU/memory ApexCharts are intentionally kept on their existing sensor IDs.
# - The old Unraid switch entities are replaced by the newer tower_* entities from the current Unraid integration.
# - Parity ETA uses graceful fallback text because no clear ETA entity is currently exposed.

title: Server monitor
path: server-monitor
icon: mdi:server-network
panel: false
badges: []

cards:
  ###########################################################################
  # TOP PRIORITY / "OH SHIT" SECTION
  ###########################################################################
  - type: markdown
    content: |
      ## Critical status
      [Unraid Device Page](/config/devices/device/db9950b8bef71e0918844cce1953eeb5)
  - type: grid
    square: false
    columns: 2
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.tower_last_parity_check_errors
        primary: Parity integrity
        secondary: >-
          {% set err = states('sensor.tower_last_parity_check_errors') | int(0) %}
          {% set running = is_state('binary_sensor.tower_parity_check_running', 'on') %}
          {% set parity_problem = is_state('binary_sensor.tower_parity_status', 'on') and not running %}
          {% if err > 0 %}
            {{ err }} parity error{{ 's' if err != 1 else '' }} detected
          {% elif parity_problem %}
            Parity status reports a problem
          {% elif running %}
            Check running · {{ states('sensor.tower_parity_check_progress') }}%
          {% else %}
            No parity errors reported
          {% endif %}
        icon: mdi:shield-alert
        icon_color: >-
          {% set err = states('sensor.tower_last_parity_check_errors') | int(0) %}
          {% set running = is_state('binary_sensor.tower_parity_check_running', 'on') %}
          {% set parity_problem = is_state('binary_sensor.tower_parity_status', 'on') and not running %}
          {% if err > 0 or parity_problem %}
            red
          {% elif running %}
            amber
          {% else %}
            green
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.tower_array_state
        primary: Array state
        secondary: >-
          {% if is_state('binary_sensor.tower_array_started', 'on') %}
            Started · {{ states('sensor.tower_array_usage') | float(0) | round(1) }}% used
          {% else %}
            Array is stopped
          {% endif %}
        icon: mdi:harddisk
        icon_color: >-
          {% if is_state('binary_sensor.tower_array_started', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: binary_sensor.rpi4_omv
        primary: Remote backup server
        secondary: >-
          {% if is_state('binary_sensor.rpi4_omv', 'on') %}
            Reachable · RTT {{ states('sensor.rpi4_omv_round_trip_time_average') }}
          {% else %}
            Remote backup server is unreachable
          {% endif %}
        icon: mdi:server-network
        icon_color: >-
          {% if is_state('binary_sensor.rpi4_omv', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.airvpn_connected_since
        primary: VPN status
        secondary: >-
          {% set s = states('sensor.airvpn_connected_since') %}
          {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
            VPN appears disconnected
          {% else %}
            Connected since {{ s }}
          {% endif %}
        icon: mdi:shield-lock
        icon_color: >-
          {% set s = states('sensor.airvpn_connected_since') %}
          {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
            red
          {% else %}
            green
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: binary_sensor.pikvm_nas
        primary: PiKVM NAS
        secondary: >-
          {% if is_state('binary_sensor.pikvm_nas', 'on') %}
            Reachable · RTT {{ states('sensor.pikvm_nas_round_trip_time_average') }}
          {% else %}
            PiKVM is unreachable
          {% endif %}
        icon: mdi:kvm
        icon_color: >-
          {% if is_state('binary_sensor.pikvm_nas', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.tower_disk_cache_usage
        primary: Cache usage
        secondary: >-
          {{ states('sensor.tower_disk_cache_usage') | float(0) | round(1) }}% used ·
          {{ state_attr('sensor.tower_disk_cache_usage', 'used') }} / {{ state_attr('sensor.tower_disk_cache_usage', 'total') }}
        icon: mdi:harddisk-plus
        icon_color: >-
          {% set u = states('sensor.tower_disk_cache_usage') | float(0) %}
          {% if u >= 90 %}
            red
          {% elif u >= 80 %}
            amber
          {% else %}
            green
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: binary_sensor.tower_parity_check_running
        primary: Parity check
        secondary: >-
          {% if is_state('binary_sensor.tower_parity_check_running', 'on') %}
            Running · {{ states('sensor.tower_parity_check_progress') }}% · {{ states('sensor.tower_parity_check_speed') }} MiB/s
          {% else %}
            Not running
          {% endif %}
        icon: mdi:shield-sync
        icon_color: >-
          {% if is_state('binary_sensor.tower_parity_check_running', 'on') %}
            amber
          {% else %}
            disabled
          {% endif %}
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: binary_sensor.tower_disks_invalid
        primary: Disk / FS issues
        secondary: >-
          {% set disabled = state_attr('binary_sensor.tower_disks_disabled', 'count') | int(0) %}
          {% set invalid = state_attr('binary_sensor.tower_disks_invalid', 'count') | int(0) %}
          {% set missing = state_attr('binary_sensor.tower_disks_missing', 'count') | int(0) %}
          {% set unmountable = state_attr('binary_sensor.tower_filesystems_unmountable', 'count') | int(0) %}
          {% if disabled + invalid + missing + unmountable > 0 %}
            {{ disabled }} disabled · {{ invalid }} invalid · {{ missing }} missing · {{ unmountable }} unmountable
          {% else %}
            No disk or filesystem issues reported
          {% endif %}
        icon: mdi:harddisk-remove
        icon_color: >-
          {% set disabled = state_attr('binary_sensor.tower_disks_disabled', 'count') | int(0) %}
          {% set invalid = state_attr('binary_sensor.tower_disks_invalid', 'count') | int(0) %}
          {% set missing = state_attr('binary_sensor.tower_disks_missing', 'count') | int(0) %}
          {% set unmountable = state_attr('binary_sensor.tower_filesystems_unmountable', 'count') | int(0) %}
          {% if disabled + invalid + missing + unmountable > 0 %}
            red
          {% else %}
            green
          {% endif %}
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: more-info

  - type: conditional
    conditions:
      - entity: binary_sensor.tower_parity_check_running
        state: 'on'
    card:
      type: vertical-stack
      cards:
        - type: custom:button-card
          entity: sensor.tower_parity_check_progress
          name: Parity Check Progress
          show_icon: false
          show_state: false
          styles:
            grid:
              - grid-template-areas: '"n" "bar" "info"'
              - grid-template-columns: 1fr
              - grid-template-rows: min-content 18px min-content
              - row-gap: 10px
            card:
              - padding: 14px
            name:
              - justify-self: start
              - font-size: 1.0em
              - font-weight: 600
            custom_fields:
              bar:
                - position: relative
                - height: 18px
                - background: rgba(255,255,255,0.10)
                - border-radius: 999px
                - overflow: hidden
              info:
                - justify-self: stretch
                - text-align: left
                - font-size: 0.95em
                - line-height: 1.45
          custom_fields:
            bar: |
              [[[ 
                const progress = Number(states['sensor.tower_parity_check_progress']?.state || 0);
                const safeProgress = Math.max(0, Math.min(progress, 100));
                return `
                  <div style="position:absolute; inset:0; border-radius:999px; overflow:hidden;">
                    <div style="width:${safeProgress}%; height:100%; background:linear-gradient(90deg, #1e88e5 0%, #42a5f5 100%);"></div>
                  </div>
                  <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:0.82em; color:white; text-shadow:0 1px 2px rgba(0,0,0,0.6);">
                    ${safeProgress.toFixed(0)}%
                  </div>
                `;
              ]]]
            info: |
              [[[ 
                const speed = states['sensor.tower_parity_check_speed']?.state ?? '-';
                const eta = states['sensor.tower_parity_check_finish']?.state
                  ?? states['sensor.tower_parity_estimated_finish']?.state
                  ?? states['sensor.tower_parity_finish_time']?.state
                  ?? 'ETA unavailable';
                return `Speed ${speed} MiB/s · ETA ${eta}`;
              ]]]
        - type: horizontal-stack
          cards:
            - type: custom:button-card
              entity: button.tower_resume_parity_check
              name: Resume parity
              icon: mdi:play
              show_state: false
              tap_action:
                action: toggle
              hold_action:
                action: more-info
              styles:
                card:
                  - padding: 6px 10px
                  - height: 68px
                  - min-height: 68px
                  - border-radius: 14px
                  - background-color: >
                      [[[
                        const status = states['switch.tower_parity_check']?.attributes?.status;
                        return status === 'paused'
                          ? 'rgba(255,255,255,0.92)'
                          : 'rgba(120,120,120,0.22)';
                      ]]]
                  - border: >
                      [[[
                        const status = states['switch.tower_parity_check']?.attributes?.status;
                        return status === 'paused'
                          ? '1px solid rgba(255,255,255,0.95)'
                          : '1px solid rgba(158,158,158,0.28)';
                      ]]]
                icon:
                  - color: >
                      [[[
                        const status = states['switch.tower_parity_check']?.attributes?.status;
                        return status === 'paused' ? 'rgb(20,20,20)' : 'rgb(189,189,189)';
                      ]]]
                  - width: 22px
                name:
                  - font-size: 0.9em
                  - font-weight: 600
                  - color: >
                      [[[
                        const status = states['switch.tower_parity_check']?.attributes?.status;
                        return status === 'paused' ? 'rgb(20,20,20)' : 'rgb(189,189,189)';
                      ]]]
            - type: custom:mushroom-template-card
              entity: switch.tower_parity_check
              primary: Unraid parity check
              secondary: >-
                {% set status = state_attr('switch.tower_parity_check', 'status') | default('unknown', true) %}
                {% set progress = state_attr('switch.tower_parity_check', 'progress') | default(states('sensor.tower_parity_check_progress'), true) %}
                {% set speed = states('sensor.tower_parity_check_speed') %}
                {% set errors = state_attr('switch.tower_parity_check', 'errors') %}
                {% if status == 'running' %}
                  Running · {{ progress }}% · {{ speed }} MiB/s
                {% elif status == 'paused' %}
                  Paused · {{ progress }}% · {{ speed }} MiB/s
                {% elif status == 'stopped' %}
                  Stopped
                {% else %}
                  {{ status | replace('_', ' ') | title }}{% if progress not in ['unknown', 'unavailable', '', none] %} · {{ progress }}%{% endif %}
                {% endif %}
                {% if errors not in [none, 'None', 'unknown', 'unavailable'] %}
                  · Errors: {{ errors }}
                {% endif %}
              icon: mdi:shield-sync
              icon_color: >-
                {% set status = state_attr('switch.tower_parity_check', 'status') | default('unknown', true) %}
                {% set errors = state_attr('switch.tower_parity_check', 'errors') %}
                {% if errors not in [none, 'None', 'unknown', 'unavailable'] and errors | int(0) > 0 %}
                  red
                {% elif status == 'running' %}
                  green
                {% elif status == 'paused' %}
                  amber
                {% elif status == 'stopped' %}
                  blue
                {% else %}
                  disabled
                {% endif %}
              multiline_secondary: true
              tap_action:
                action: more-info

  ###########################################################################
  # OVERVIEW
  ###########################################################################
  - type: markdown
    content: |
      ## Overview

  - type: grid
    square: false
    columns: 2
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.tower_unraid_version
        primary: Unraid version
        secondary: >-
          {{ states('sensor.tower_unraid_version') }} · API {{ state_attr('sensor.tower_unraid_version', 'api_version') }}
        icon: mdi:server
        icon_color: blue
        fill_container: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_uptime_2
        primary: Up since
        secondary: >-
          {{ states('sensor.tower_uptime_2') }}
        icon: mdi:clock-start
        icon_color: green
        fill_container: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_array_state
        primary: Array state
        secondary: >-
          {% if is_state('binary_sensor.tower_array_started', 'on') %}
            Started
          {% else %}
            Stopped
          {% endif %}
        icon: mdi:harddisk
        icon_color: >-
          {% if is_state('binary_sensor.tower_array_started', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_array_usage
        primary: Array usage
        secondary: >-
          {{ states('sensor.tower_array_usage') | float(0) | round(1) }}% · {{ state_attr('sensor.tower_array_usage', 'used') }} / {{ state_attr('sensor.tower_array_usage', 'total') }}
        icon: mdi:harddisk-plus
        icon_color: >-
          {% set u = states('sensor.tower_array_usage') | float(0) %}
          {% if u >= 90 %}
            red
          {% elif u >= 80 %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true
        multiline_secondary: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_active_notifications
        primary: Active notifications
        secondary: >-
          {{ states('sensor.tower_active_notifications') }} active
        icon: mdi:bell-badge
        icon_color: >-
          {% if states('sensor.tower_active_notifications') | int(0) > 0 %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: binary_sensor.tower_mover_active
        primary: Mover
        secondary: >-
          {% if is_state('binary_sensor.tower_mover_active', 'on') %}
            Running
          {% else %}
            Idle
          {% endif %}
        icon: mdi:swap-horizontal-bold
        icon_color: >-
          {% if is_state('binary_sensor.tower_mover_active', 'on') %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: binary_sensor.tower_cloud_connected
        primary: Cloud relay
        secondary: >-
          {% if is_state('binary_sensor.tower_cloud_connected', 'on') %}
            Connected
          {% else %}
            Disconnected · {{ state_attr('binary_sensor.tower_cloud_connected', 'relay_status') or 'unknown' }}
          {% endif %}
        icon: mdi:cloud
        icon_color: >-
          {% if is_state('binary_sensor.tower_cloud_connected', 'on') %}
            green
          {% else %}
            red
          {% endif %}
        fill_container: true
        multiline_secondary: true
      - type: custom:mushroom-template-card
        entity: binary_sensor.tower_config_valid
        primary: Config validity
        secondary: >-
          {% if is_state('binary_sensor.tower_config_valid', 'on') %}
            Configuration problem detected
          {% else %}
            Configuration looks valid
          {% endif %}
        icon: mdi:cog-check
        icon_color: >-
          {% if is_state('binary_sensor.tower_config_valid', 'on') %}
            red
          {% else %}
            green
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: binary_sensor.tower_safe_mode
        primary: Safe mode
        secondary: >-
          {% if is_state('binary_sensor.tower_safe_mode', 'on') %}
            Enabled
          {% else %}
            Normal mode
          {% endif %}
        icon: mdi:shield-half-full
        icon_color: >-
          {% if is_state('binary_sensor.tower_safe_mode', 'on') %}
            red
          {% else %}
            green
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_cpu_usage
        primary: CPU
        secondary: >-
          {{ states('sensor.tower_cpu_usage') | float(0) | round(1) }}% · {{ states('sensor.tower_cpu_temperature') }} °C · {{ states('sensor.tower_cpu_power') }} W
        icon: mdi:cpu-64-bit
        icon_color: >-
          {% set u = states('sensor.tower_cpu_usage') | float(0) %}
          {% if u >= 90 %}
            red
          {% elif u >= 60 %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true
        multiline_secondary: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_ram_usage
        primary: Memory
        secondary: >-
          {{ states('sensor.tower_ram_usage') | float(0) | round(1) }}% · {{ states('sensor.tower_ram_used') }} GiB used
        icon: mdi:memory
        icon_color: >-
          {% set u = states('sensor.tower_ram_usage') | float(0) %}
          {% if u >= 90 %}
            red
          {% elif u >= 75 %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_swap_usage
        primary: Swap
        secondary: >-
          {{ states('sensor.tower_swap_usage') | float(0) | round(1) }}% · {{ states('sensor.tower_swap_used') }} GiB used
        icon: mdi:swap-horizontal
        icon_color: >-
          {% set u = states('sensor.tower_swap_usage') | float(0) %}
          {% if u > 0 %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true
      - type: custom:mushroom-template-card
        entity: sensor.tower_flash_device_usage
        primary: Flash usage
        secondary: >-
          {% set s = states('sensor.tower_flash_device_usage') %}
          {% if s in ['unknown', 'unavailable'] %}
            Unavailable
          {% else %}
            {{ s | float(0) | round(1) }}% used
          {% endif %}
        icon: mdi:usb-flash-drive
        icon_color: >-
          {% set s = states('sensor.tower_flash_device_usage') %}
          {% if s in ['unknown', 'unavailable'] %}
            red
          {% elif s | float(0) >= 90 %}
            red
          {% elif s | float(0) >= 75 %}
            amber
          {% else %}
            green
          {% endif %}
        fill_container: true

  ###########################################################################
  # PARITY / ARRAY CONTROL
  ###########################################################################
  - type: custom:collapsable-cards
    title: Parity and array
    cards:
      - type: gauge
        entity: sensor.tower_parity_check_progress
        name: Parity check progress
        min: 0
        max: 100
        severity:
          green: 0
          yellow: 1
          red: 95

      - type: custom:mushroom-template-card
        entity: switch.tower_parity_check
        primary: Unraid parity check
        secondary: >-
          {% set status = state_attr('switch.tower_parity_check', 'status') | default('unknown', true) %}
          {% set progress = state_attr('switch.tower_parity_check', 'progress') | default(states('sensor.tower_parity_check_progress'), true) %}
          {% set speed = states('sensor.tower_parity_check_speed') %}
          {% set errors = state_attr('switch.tower_parity_check', 'errors') %}
          {% if status == 'running' %}
            Running · {{ progress }}% · {{ speed }} MiB/s
          {% elif status == 'paused' %}
            Paused · {{ progress }}% · {{ speed }} MiB/s
          {% elif status == 'stopped' %}
            Stopped
          {% else %}
            {{ status | replace('_', ' ') | title }}{% if progress not in ['unknown', 'unavailable', '', none] %} · {{ progress }}%{% endif %}
          {% endif %}
          {% if errors not in [none, 'None', 'unknown', 'unavailable'] %}
            · Errors: {{ errors }}
          {% endif %}
        icon: mdi:shield-sync
        icon_color: >-
          {% set status = state_attr('switch.tower_parity_check', 'status') | default('unknown', true) %}
          {% set errors = state_attr('switch.tower_parity_check', 'errors') %}
          {% if errors not in [none, 'None', 'unknown', 'unavailable'] and errors | int(0) > 0 %}
            red
          {% elif status == 'running' %}
            green
          {% elif status == 'paused' %}
            amber
          {% elif status == 'stopped' %}
            blue
          {% else %}
            disabled
          {% endif %}
        multiline_secondary: true
        tap_action:
          action: more-info

      - type: entities
        title: Parity status
        show_header_toggle: false
        entities:
          - entity: binary_sensor.tower_parity_check_running
            name: Running
          - entity: sensor.tower_parity_check_progress
            name: Progress
          - entity: sensor.tower_parity_check_speed
            name: Speed
          - entity: binary_sensor.tower_parity_status
            name: Status
          - entity: binary_sensor.tower_parity_valid
            name: Valid
          - entity: sensor.tower_last_parity_check_errors
            name: Last parity check errors

      - type: grid
        square: false
        columns: 3
        cards:
          - type: button
            entity: button.tower_start_parity_check
            name: Start parity
            tap_action:
              action: toggle
          - type: button
            entity: button.tower_stop_parity_check
            name: Stop parity
            tap_action:
              action: toggle
          - type: button
            entity: button.tower_resume_parity_check
            name: Resume parity
            tap_action:
              action: toggle
          - type: button
            entity: button.tower_start_array
            name: Start array
            tap_action:
              action: toggle
          - type: button
            entity: button.tower_stop_array
            name: Stop array
            tap_action:
              action: toggle

  ###########################################################################
  # STORAGE
  ###########################################################################
  - type: markdown
    content: |
      ## Storage

  - type: grid
    square: false
    columns: 2
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.tower_disk_cache_usage
        primary: Cache
        secondary: >-
          {{ states('sensor.tower_disk_cache_temperature') }} °C ·
          {{ states('sensor.tower_disk_cache_usage') | float(0) | round(1) }}% used ·
          {{ state_attr('sensor.tower_disk_cache_usage', 'used') }} / {{ state_attr('sensor.tower_disk_cache_usage', 'total') }}
        icon: mdi:harddisk-plus
        icon_color: >-
          {% set health = is_state('binary_sensor.tower_disk_cache_health', 'on') %}
          {% set usage = states('sensor.tower_disk_cache_usage') | float(0) %}
          {% if health or usage >= 90 %}
            red
          {% elif usage >= 80 %}
            amber
          {% else %}
            blue
          {% endif %}
        fill_container: true
        multiline_secondary: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.tower_disk_parity_temperature
        primary: Parity disk
        secondary: >-
          {{ states('sensor.tower_disk_parity_temperature') }} °C ·
          {{ state_attr('binary_sensor.tower_disk_parity_health', 'status') }} ·
          {{ 'spinning' if state_attr('binary_sensor.tower_disk_parity_health', 'spinning') else 'standby' }}
        icon: mdi:shield-harddisk
        icon_color: >-
          {% if is_state('binary_sensor.tower_disk_parity_health', 'on') %}
            red
          {% else %}
            teal
          {% endif %}
        fill_container: true
        multiline_secondary: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.tower_disk_disk1_usage
        primary: Disk 1
        secondary: >-
