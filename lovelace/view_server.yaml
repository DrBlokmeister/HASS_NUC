              {%- elif quality >= 70 -%}
                green
              {%- elif quality >= 45 -%}
                amber
              {%- else -%}
                red
              {%- endif -%}
            fill_container: true
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: sensor.pikvm_nas_cpu_temp
            primary: CPU temperature
            secondary: >-
              {%- set temp = states('sensor.pikvm_nas_cpu_temp') -%}
              {%- if temp in ['unknown', 'unavailable', 'none', 'None', ''] -%}
                Unavailable
              {%- else -%}
                {{ temp | float(0) | round(1) }} °C
              {%- endif -%}
