          {%- set status = state_attr(health_entity, 'status') -%}
          {%- set spinning = state_attr(health_entity, 'spinning') -%}
          {%- if health_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
            Unavailable
          {%- else -%}
            {{ temp if temp not in [none, 'unknown', 'unavailable', 'none', 'None', ''] else '—' }} °C · {{ 'spinning' if spinning else 'standby' }}{{ '\n' }}{{ status | default('OK', true) | replace('DISK_', '') }}
