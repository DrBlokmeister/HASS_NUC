          {%- elif total > 0 -%}
            {{ total }} issue{{ 's' if total != 1 else '' }}{{ '\n' }}{{ disabled }} dis · {{ invalid }} inv · {{ missing }} miss · {{ unmountable }} unmnt
          {%- else -%}
            All disks OK{{ '\n' }}No FS issues
