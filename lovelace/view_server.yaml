              {%- set rtt_state = states('sensor.pikvm_nas_round_trip_time_average') -%}
              {%- set rtt = rtt_state | float(999) -%}
              {%- if rtt_state in ['unknown', 'unavailable', 'none', 'None', ''] -%}
