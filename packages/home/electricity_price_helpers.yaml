  # Cheapeast day price sensors
  - trigger:
      - platform: time
        at:
          - "05:05"
          - "06:05"
          - "07:05"
          - "08:05"
          - "09:05"
    sensor:
      - name: "Cheapest Day Price (10-18)"
        unique_id: yaml_template_sensor_cheapest_day_price_10_18
        icon: mdi:weather-sunny
        unit_of_measurement: "€/kWh"
        state_class: measurement
        state: >-
          {%- set prices = state_attr('sensor.nordpool_energy_price', 'raw_today') or [] -%}
          {%- set ns = namespace(cheapest=None) -%}
          {%- for price in prices -%}
            {%- set hour = as_datetime(price.start).hour -%}
            {%- if hour >= 10 and hour <= 18 -%}
              {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                {%- set ns.cheapest = price -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{- ns.cheapest.value | float | round(3) -}}
        availability: >-
          {%- set prices = state_attr('sensor.nordpool_energy_price', 'raw_today') or [] -%}
          {%- set ns = namespace(cheapest=None) -%}
          {%- for price in prices -%}
            {%- set hour = as_datetime(price.start).hour -%}
            {%- if hour >= 10 and hour <= 18 -%}
              {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                {%- set ns.cheapest = price -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.cheapest is not none }}
        attributes:
          timestamp_of_cheapest_time: >-
            {%- set prices = state_attr('sensor.nordpool_energy_price', 'raw_today') or [] -%}
            {%- set ns = namespace(cheapest=None) -%}
            {%- for price in prices -%}
              {%- set hour = as_datetime(price.start).hour -%}
              {%- if hour >= 10 and hour <= 18 -%}
                {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                  {%- set ns.cheapest = price -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- as_datetime(ns.cheapest.start).strftime('%Y-%m-%d %H:%M') if ns.cheapest else none -}}
          cheapest_hour: >-
            {%- set prices = state_attr('sensor.nordpool_energy_price', 'raw_today') or [] -%}
            {%- set ns = namespace(cheapest=None) -%}
            {%- for price in prices -%}
              {%- set hour = as_datetime(price.start).hour -%}
              {%- if hour >= 10 and hour <= 18 -%}
                {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                  {%- set ns.cheapest = price -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- as_datetime(ns.cheapest.start).hour if ns.cheapest else none -}}
