              {% if dt_end > now() and (dt_start.hour >= 21 or dt_start.hour < 8) %}
                {% set ns.night = ns.night + [p] %}
              {% endif %}
            {% endfor %}
            {% set best = ns.night | sort(attribute='value') | first if ns.night else none %}
