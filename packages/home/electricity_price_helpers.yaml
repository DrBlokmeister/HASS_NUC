  # Cheapest night price sensors
  - trigger:
      - platform: time
        at:
          - "15:05"
          - "16:05"
          - "17:05"
          - "18:05"
          - "8:05"
    sensor:
      - name: "Cheapest Night Price"
        unique_id: "cheapest_night_price_sensor"
        icon: mdi:weather-night
        unit_of_measurement: '€/kWh'
        state: >
          {%- set ns = namespace(cheapest=None) -%}
          {%- if now().hour >= 15 -%}
            {%- set prices = state_attr('sensor.nordpool_energy_price_hourly', 'raw_today') + state_attr('sensor.nordpool_energy_price_hourly', 'raw_tomorrow') -%}
          {%- else -%}
            {%- set prices = state_attr('sensor.nordpool_energy_price_hourly', 'raw_today') -%}
          {%- endif -%}
          {%- for price in prices -%}
            {%- if now().hour < 15 and as_datetime(price.start).hour >= 21 or now().hour >= 15 and as_datetime(price.start).hour < 8 -%}
              {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                {%- set ns.cheapest = price -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{- ns.cheapest.value if ns.cheapest else 'Unavailable' -}}
        attributes:
          timestamp_of_cheapest_time: >
            {%- set ns = namespace(cheapest=None) -%}
            {%- if now().hour >= 15 -%}
              {%- set prices = state_attr('sensor.nordpool_energy_price_hourly', 'raw_today') + state_attr('sensor.nordpool_energy_price_hourly', 'raw_tomorrow') -%}
            {%- else -%}
              {%- set prices = state_attr('sensor.nordpool_energy_price_hourly', 'raw_today') -%}
            {%- endif -%}
            {%- for price in prices -%}
              {%- if now().hour < 15 and as_datetime(price.start).hour >= 21 or now().hour >= 15 and as_datetime(price.start).hour < 8 -%}
                {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                  {%- set ns.cheapest = price -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- as_datetime(ns.cheapest.start).strftime('%Y-%m-%d %H:%M') if ns.cheapest else 'Unavailable' -}}
          cheapest_hour: >
            {%- set ns = namespace(cheapest=None) -%}
            {%- if now().hour >= 15 -%}
              {%- set prices = state_attr('sensor.nordpool_energy_price_hourly', 'raw_today') + state_attr('sensor.nordpool_energy_price_hourly', 'raw_tomorrow') -%}
            {%- else -%}
              {%- set prices = state_attr('sensor.nordpool_energy_price_hourly', 'raw_today') -%}
            {%- endif -%}
            {%- for price in prices -%}
              {%- if now().hour < 15 and as_datetime(price.start).hour >= 21 or now().hour >= 15 and as_datetime(price.start).hour < 8 -%}
                {%- if ns.cheapest is none or price.value < ns.cheapest.value -%}
                  {%- set ns.cheapest = price -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- as_datetime(ns.cheapest.start).hour if ns.cheapest else 'Unavailable' -}}
          whole_night_included: >
            {% set raw_tomorrow = state_attr('sensor.nordpool_energy_price_hourly', 'raw_tomorrow') %}
            {{- 'Yes' if not (raw_tomorrow is not defined or raw_tomorrow == none or (raw_tomorrow | length == 0)) else 'No' -}}
            {# {{- 'Yes' if now().hour >= 15 else 'No' -}} #}
      # Rolling hourly averages lowest night prices
      - name: "Nordpool Rolling 1h Cheapest Night Price"
        unique_id: yaml_template_sensor_nordpool_rolling_1h_cheapest_night
