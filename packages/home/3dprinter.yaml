        icon: mdi:ip-network
        device_class: running
        state: >-
          {% set value = state_attr('sensor.p1s_cam_system_details', 'ice_listening') %}
          {{ value in [true, 'true', 'True', 1, '1'] }}
        availability: >-
          {{
            not is_state('sensor.p1s_cam_system_details', 'unavailable')
            and state_attr('sensor.p1s_cam_system_details', 'ice_listening') not in [none, '', 'unknown', 'unavailable']
