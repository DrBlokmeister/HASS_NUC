homeassistant:
  customize: {}

###################
#    TEMPLATES    #
###################
template:
  - sensor:
      - name: "P1S Cam Signal Level"
        unique_id: yaml_template_sensor_p1s_cam_signal_level
        icon: mdi:wifi-strength-2
        state: "{{ state_attr('sensor.p1s_cam_system_details', 'signal_level') | int(0) }}"
        unit_of_measurement: "dBm"
        device_class: signal_strength
        state_class: measurement
        availability: >-
          {{
            not is_state('sensor.p1s_cam_system_details', 'unavailable')
            and state_attr('sensor.p1s_cam_system_details', 'signal_level') not in [none, '', 'unknown', 'unavailable']
          }}
