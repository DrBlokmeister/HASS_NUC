        device_class: problem
        state: >-
          {% set raw = state_attr('sensor.p1s_cam_system_details', 'throttled') | default('0x0', true) %}
          {% set value = raw | int(0, 0) %}
          {{ value % 2 == 1 }}
        availability: >-
          {{
            not is_state('sensor.p1s_cam_system_details', 'unavailable')
            and state_attr('sensor.p1s_cam_system_details', 'throttled') not in [none, '', 'unknown', 'unavailable']
          }}
