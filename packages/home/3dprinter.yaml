        unique_id: yaml_template_sensor_p1s_cam_link_quality
        icon: mdi:wifi-strength
        state: "{{ state_attr('sensor.p1s_cam_system_details', 'link_quality') | int(0) }}"
        unit_of_measurement: "%"
