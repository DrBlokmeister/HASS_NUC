homeassistant:
  customize: {}

input_number: {}

input_select:
  vacuum_scheduled_cleaning_mode:
    name: Vacuum Scheduled Cleaning Mode
    options:
      - "Once Daily"
      - "Multiple Times Daily"
      - "Off"
    initial: "Once Daily"
    icon: mdi:robot-vacuum

utility_meter:
  dustin_area_cleaned_today:
    name: Dustin Area Cleaned Today
    source: sensor.dustin_cleaned_area
    cycle: daily
    offset:
      hours: 3
    periodically_resetting: true
    always_available: true

  moeke_area_cleaned_today:
    name: Moeke Area Cleaned Today
    source: sensor.moeke_cleaned_area
    cycle: daily
    offset:
      hours: 3
    periodically_resetting: true
    always_available: true

  alfred_area_cleaned_today:
    name: Alfred Area Cleaned Today
    source: sensor.alfred_current_clean_area
    cycle: daily
    offset:
      hours: 3
    periodically_resetting: true
    always_available: true

########################
#    TEMPLATE ENTITIES #
########################
template:
  - sensor:
      - name: "Alfred Battery"
        unique_id: yaml_template_sensor_alfred_battery
        icon: mdi:battery
        device_class: battery
        unit_of_measurement: "%"
        state: "{{ state_attr('vacuum.alfred', 'battery_level') }}"
        availability: >-
          {{ states('vacuum.alfred') not in ['none', 'None', 'unavailable', 'unknown', None]
             and state_attr('vacuum.alfred', 'battery_level') is not none }}

      - name: "Dustin Power Estimate"
        unique_id: yaml_template_sensor_dustin_power_estimate
        icon: mdi:flash
        device_class: power
        unit_of_measurement: "W"
        state: >-
          {% set vacuum_state = states('vacuum.dustin') %}
          {% set battery = states('sensor.dustin_battery_level') | int(100) %}
          {% set base_status = states('sensor.dustin_self_wash_base_status') %}
          {% set drying = is_state('sensor.dustin_self_wash_base_status', 'drying') or is_state('sensor.dustin_drying_progress', 'unknown') == false and states('sensor.dustin_drying_progress') | int(0) > 0 %}
          {% if vacuum_state in ['unknown', 'unavailable', 'none', 'None', ''] %}
            0
          {% elif is_state('vacuum.dustin', 'docked') and battery < 100 and drying %}
            60
          {% elif is_state('vacuum.dustin', 'docked') and battery < 100 %}
            20
          {% elif is_state('vacuum.dustin', 'docked') and drying %}
            50
          {% elif is_state('vacuum.dustin', 'docked') %}
            3
          {% else %}
            0
          {% endif %}
        availability: >-
          {{ states('vacuum.dustin') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

      - name: "Moeke Power Estimate"
        unique_id: yaml_template_sensor_moeke_power_estimate
        icon: mdi:flash
        device_class: power
        unit_of_measurement: "W"
        state: >-
          {% set vacuum_state = states('vacuum.moeke') %}
          {% set battery = states('sensor.moeke_battery_level') | int(100) %}
          {% set drying = is_state('sensor.moeke_self_wash_base_status', 'drying') %}
          {% if vacuum_state in ['unknown', 'unavailable', 'none', 'None', ''] %}
            0
          {% elif is_state('vacuum.moeke', 'docked') and battery < 100 and drying %}
            60
          {% elif is_state('vacuum.moeke', 'docked') and battery < 100 %}
            20
          {% elif is_state('vacuum.moeke', 'docked') and drying %}
            50
          {% elif is_state('vacuum.moeke', 'docked') %}
            3
          {% else %}
            0
          {% endif %}
        availability: >-
          {{ states('vacuum.moeke') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

      - name: "Alfred Power Estimate"
        unique_id: yaml_template_sensor_alfred_power_estimate
        icon: mdi:flash
        device_class: power
        unit_of_measurement: "W"
        state: >-
          {% set vacuum_state = states('vacuum.alfred') %}
          {% set battery = state_attr('vacuum.alfred', 'battery_level') | int(100) %}
          {% if vacuum_state in ['unknown', 'unavailable', 'none', 'None', ''] %}
            0
          {% elif is_state('vacuum.alfred', 'docked') and battery < 100 %}
            20
          {% elif is_state('vacuum.alfred', 'docked') and battery == 100 %}
            3
          {% else %}
            0
          {% endif %}
        availability: >-
          {{ states('vacuum.alfred') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

  - binary_sensor:
      - name: "Tamara or Sander Downstairs"
        unique_id: yaml_template_binary_sensor_tamara_or_sander_downstairs
        icon: mdi:stairs-down
        device_class: occupancy
        state: >-
          {{
            ( is_state('device_tracker.tamaraphonep9a_unifi', 'home')
              and is_state('sensor.tamara_phone_ap_name', 'U6-LR') )
            or
            ( is_state('device_tracker.blokmeisterp9pro_unifi', 'home')
              and is_state('sensor.sander_phone_ap_name', 'U6-LR') )
          }}
        availability: >-
          {{ not (
              is_state('device_tracker.tamaraphonep9a_unifi', 'unavailable')
              and is_state('device_tracker.blokmeisterp9pro_unifi', 'unavailable')
            ) }}

#################
#    SENSORS    #
#################
sensor:
  - platform: min_max
    name: Vacuums Power Estimate
    type: sum
    round_digits: 0
    entity_ids:
      - sensor.dustin_power_estimate
      - sensor.moeke_power_estimate
      - sensor.alfred_power_estimate

  - platform: integration
    source: sensor.dustin_power_estimate
    name: Dustin Energy
    unique_id: integration_dustin_energy
    unit_time: h
    unit_prefix: k
    method: left
    round: 2

  - platform: integration
    source: sensor.moeke_power_estimate
    name: Moeke Energy
    unique_id: integration_moeke_energy
    unit_time: h
    unit_prefix: k
    method: left
    round: 2

  - platform: integration
    source: sensor.alfred_power_estimate
    name: Alfred Energy
    unique_id: integration_alfred_energy
    unit_time: h
    unit_prefix: k
    method: left
    round: 2

  - platform: min_max
    name: Vacuums Energy Estimate
    type: sum
    round_digits: 2
    entity_ids:
      - sensor.dustin_energy
      - sensor.moeke_energy
      - sensor.alfred_energy

########################
#    BINARY SENSORS    #
########################

##################
#    SWITCHES    #
##################
switch:

########################
#    INPUT BOOLEANS    #
########################
input_boolean:

##################
#    COUNTERS    #
##################
counter:

#####################
#    AUTOMATIONS    #
#####################
automation:
  - alias: '[home|vacuum] Scheduled Cleanup'
    id: home_vacuum_scheduled_cleanup
    description: >
      Starts the available vacuums when nobody is home. Dustin covers the ground
      floor, Moeke covers the first floor on Monday, Wednesday and Friday with
      mopping enabled, and Alfred covers the second floor.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.house_occupied
        to: "off"
      - platform: time
        at: "07:00:00"
    condition:
      - condition: time
        after: "07:00:00"
        before: "22:00:00"
      - condition: state
        entity_id: binary_sensor.house_occupied
        state: "off"
      - condition: state
        entity_id: input_select.vacuum_scheduled_cleaning_mode
        state:
          - "Once Daily"
          - "Multiple Times Daily"
      - condition: or
        conditions:
          - condition: numeric_state
            entity_id: sensor.moeke_area_cleaned_today
            below: 20
          - condition: numeric_state
            entity_id: sensor.argus_area_cleaned_today
            below: 20
          - condition: numeric_state
            entity_id: sensor.alfred_area_cleaned_today
            below: 20
          - condition: state
            entity_id: input_select.vacuum_scheduled_cleaning_mode
            state: "Multiple Times Daily"
    action:
      - parallel:
          - if:   #Start Alfred
              - condition: numeric_state
                entity_id: sensor.dustin_area_cleaned_today
                below: 20
            then:
              - service: vacuum.set_fan_speed
                continue_on_error: true
                target:
                  entity_id: vacuum.dustin
                data:
                  fan_speed: Strong
              - service: select.select_option
                continue_on_error: true
                target:
                  entity_id: select.dustin_cleaning_mode
                data:
                  option: >-
                    {% if states('sensor.dustin_error') in ['clean_tank_level', 'dirty_tank_level']
                        or states('sensor.dustin_low_water_warning') not in ['no_warning', 'unavailable', 'unknown']
                        or is_state('sensor.dustin_mop_pad', 'not_installed') %}
                      sweeping
                    {% else %}
                      sweeping_and_mopping
                    {% endif %}
              - delay:
                  seconds: 2
              - service: vacuum.start
                continue_on_error: true
                target:
                  entity_id: vacuum.dustin
          - if:
              - condition: numeric_state
                entity_id: sensor.moeke_area_cleaned_today
                below: 20
            then:
              - service: vacuum.set_fan_speed
                continue_on_error: true
                target:
                  entity_id: vacuum.moeke
                data:
                  fan_speed: Strong
              - service: select.select_option
                continue_on_error: true
                target:
                  entity_id: select.moeke_cleaning_mode
                data:
                  option: >-
                    {% if states('sensor.moeke_error') in ['clean_tank_level', 'dirty_tank_level']
                        or is_state('binary_sensor.moeke_reservoir_leak_sensor', 'off')
                        or now().weekday() in [1, 3, 5, 6]
                    %}
                      sweeping
                    {% else %}
                      sweeping_and_mopping
                    {% endif %}
              - delay:
                  seconds: 2
              - service: vacuum.start
                continue_on_error: true
                target:
                  entity_id: vacuum.moeke
          - if:
              - condition: numeric_state
                entity_id: sensor.alfred_area_cleaned_today
                below: 20
            then:
              - service: vacuum.set_fan_speed
                continue_on_error: true
                target:
                  entity_id: vacuum.alfred
                data:
                  fan_speed: Medium
              - service: vacuum.start
                continue_on_error: true
                target:
                  entity_id: vacuum.alfred
      - delay:
          seconds: 30
      - service: notify.sander_and_tamara_phones
        data:
          title: "Home Assistant - Vacuum"
          message: >-
            {% set vacuums = [states.vacuum.dustin, states.vacuum.moeke, states.vacuum.alfred] %}
            {% set active = vacuums | reject('eq', None) | selectattr('state', 'equalto', 'cleaning') | map(attribute='name') | list %}
            {% if active | length == 0 %}
              Scheduled cleanup triggered but no vacuums started.
            {% elif active | length == 1 %}
              Started scheduled cleanup with vacuum {{ active[0] }}.
            {% elif active | length == 2 %}
              Started scheduled cleanup with vacuums {{ active | join(' and ') }}.
            {% else %}
              Started scheduled cleanup with vacuums {{ active[:-1] | join(', ') }} and {{ active[-1] }}.
            {% endif %}
          data:
            ttl: 0
            priority: high
            sticky: "true"
            group: info
            tag: vacuum
            notification_icon: mdi:robot-vacuum
            timeout: 1800

  - alias: "[home|vacuum] Backup cleanup"  #If we stay home until 15:00, be more agressive in trying to find a cleaning slot
    id: home_vacuum_backup_cleanup
    description: >
      If the ground floor was not cleaned before 15:00, start Dustin when nobody
      appears to be downstairs for at least 15 minutes.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.tamara_or_sander_downstairs
        to: "off"
        for:
          minutes: 15
      - platform: time
        at: "15:00:00"
    condition:
      - condition: time
        after: "15:00:00"
        before: "22:00:00"
      - condition: numeric_state
        entity_id: sensor.dustin_area_cleaned_today
        below: 20
      - condition: state
        entity_id: binary_sensor.tamara_or_sander_downstairs
        state: "off"
        for:
          minutes: 15
    action:
      - service: vacuum.set_fan_speed
        continue_on_error: true
        target:
          entity_id: vacuum.dustin
        data:
          fan_speed: Strong
      - service: select.select_option
        continue_on_error: true
        target:
          entity_id: select.dustin_cleaning_mode
        data:
          option: >-
            {% if states('sensor.dustin_error') in ['clean_tank_level', 'dirty_tank_level']
               or states('sensor.dustin_low_water_warning') not in ['no_warning', 'unavailable', 'unknown']
               or is_state('sensor.dustin_mop_pad', 'not_installed') %}
              sweeping
            {% else %}
              sweeping_and_mopping
            {% endif %}
      - delay:
          seconds: 2
      - service: vacuum.start
        continue_on_error: true
        target:
          entity_id: vacuum.dustin

  - alias: "[home|vacuum] Button control Moeke"
    id: home_vacuum_button_control_moeke
    description: >
      Controls Moeke with the existing deCONZ switch. This remains on Moeke
      because the leak sensor and button workflow move with the vacuum.
    mode: restart
    trigger:
      - platform: event
        event_type: deconz_event
        event_data:
          id: moeke_switch
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.event == 1003 }}"
              - condition: state
                entity_id: vacuum.moeke
                state: "docked"
            sequence:
              - service: button.press
                continue_on_error: true
                target:
                  entity_id: button.moeke_clear_warning
              - service: persistent_notification.dismiss
                continue_on_error: true
                data:
                  notification_id: "NOTIFICATION_ID_WARNING"

          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.event == 1002 }}"
              - condition: template
                value_template: "{{ not is_state('vacuum.moeke', 'cleaning') }}"
            sequence:
              - service: vacuum.set_fan_speed
                continue_on_error: true
                target:
                  entity_id: vacuum.moeke
                data:
                  fan_speed: Strong
              - service: select.select_option
                continue_on_error: true
                target:
                  entity_id: select.moeke_cleaning_mode
                data:
                  option: >-
                    {% if states('sensor.moeke_error') in ['clean_tank_level', 'dirty_tank_level']
                       or is_state('binary_sensor.moeke_reservoir_leak_sensor', 'off') %}
                      sweeping
                    {% else %}
                      sweeping_and_mopping
                    {% endif %}
              - delay:
                  seconds: 2
              - service: vacuum.start
                continue_on_error: true
                target:
                  entity_id: vacuum.moeke

          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.event == 1002 }}"
              - condition: state
                entity_id: vacuum.moeke
                state: "cleaning"
            sequence:
              - service: vacuum.pause
                target:
                  entity_id: vacuum.moeke

          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.event == 1004 }}"
              - condition: template
                value_template: "{{ not is_state('vacuum.moeke', 'docked') }}"
            sequence:
              - service: vacuum.return_to_base
                target:
                  entity_id: vacuum.moeke

  - alias: "[home|vacuum] Notify phone if vacuum is in error"
    id: home_vacuum_notify_phone_if_vacuum_is_in_error
    description: >
      Sends a high-priority notification when Dustin, Moeke, or Alfred reports an
      error. Dustin and Moeke use Dreame-style camera maps; Alfred keeps the
      existing image map behavior.
    mode: parallel
    trigger:
      - platform: state
        entity_id: vacuum.dustin
        to: "error"
        id: Dustin
      - platform: state
        entity_id: vacuum.moeke
        to: "error"
        id: Moeke
      - platform: state
        entity_id: vacuum.alfred
        to: "error"
        id: Alfred
    action:
      - variables:
          vacuum_entity_id: "{{ trigger.entity_id }}"
          vacuum_slug: "{{ trigger.entity_id.split('.')[1] }}"
          map_entity_id: >-
            {% if trigger.id in ['Dustin', 'Moeke'] %}
              camera.{{ vacuum_slug }}_map
            {% else %}
              image.{{ vacuum_slug }}_map
            {% endif %}
          map_type: >-
            {% if trigger.id in ['Dustin', 'Moeke'] %}
              camera
            {% else %}
              image
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'Dustin' }}"
            sequence:
              - service: homeassistant.update_entity
                continue_on_error: true
                target:
                  entity_id: "{{ map_entity_id }}"
              - service: conversation.process
                response_variable: gpt_vacuum_error_response
                data:
                  agent_id: conversation.chatgpt_5d1
                  text: >-
                    Write a short phone notification message for the user. The ground floor robot vacuum "Dustin"
                    has reported an error. Keep it to max 2 short sentences and max about 200 characters.
                    Be clear and useful. Add one relevant emoji.

                    Sensor data:
                    - Current state: {{ states('vacuum.dustin') }}
                    - Error description: {{ state_attr('vacuum.dustin', 'error') }}
                    - Error sensor: {{ states('sensor.dustin_error') }}
                    - Low water warning: {{ states('sensor.dustin_low_water_warning') }}
                    - Clean water tank: {{ states('sensor.dustin_clean_water_tank_status') }}
                    - Dirty water tank: {{ states('sensor.dustin_dirty_water_tank_status') }}
                    - Mop pad: {{ states('sensor.dustin_mop_pad') }}

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'Moeke' }}"
            sequence:
              - service: homeassistant.update_entity
                continue_on_error: true
                target:
                  entity_id: "{{ map_entity_id }}"
              - service: conversation.process
                response_variable: gpt_vacuum_error_response
                data:
                  agent_id: conversation.chatgpt_5d1
                  text: >-
                    You are a helpful assistant. Write a short phone notification message
                    to inform the user that their first-floor robot vacuum cleaner "Moeke"
                    has reported an error.

                    Goal: Help the user understand what might be wrong using the sensor data below.
                    Write no more than 2 short sentences, max about 200 characters total.
                    Be friendly and clear.

                    Sensor data:
                    - Current state: {{ states('vacuum.moeke') }}
                    - Error description: {{ state_attr('vacuum.moeke', 'error') }}
                    - Error sensor: {{ states('sensor.moeke_error') }}
                    - Low water warning from vacuum: {{ state_attr('vacuum.moeke', 'low_water_warning') }}
                    - Water detected in clean reservoir leak sensor: {{ states('binary_sensor.moeke_reservoir_leak_sensor') }}

                    Context notes:
                    - Moeke uses clean water for mop washing. The leak sensor hangs inside this reservoir.
                    - If the leak sensor is 'off', the tank is truly empty.
                    - If the leak sensor is 'on' and low water warning is 'No warning', everything is fine — do not mention a water issue.
                    - A water refill might be needed if leak sensor is 'off' or low water warning indicates this.
                    - If there is a known error description, summarize it briefly and clearly.
                    - If everything seems okay but a transient error occurred, say it might be a fluke.
                    - End with a relevant emoji: 💧 if water, 🧼 if cleaning-related, 🤖 otherwise.
                    - No markdown, titles, or formatting — just plain text.
        default:
          - service: conversation.process
            response_variable: gpt_vacuum_error_response
            data:
              agent_id: conversation.chatgpt_5d1
              text: >-
                Write a short and clear phone notification to inform the user
                that their second-floor robot vacuum cleaner "Alfred" encountered an error.

                Entity state: {{ states('vacuum.alfred') }}
                Error description: {{ state_attr('vacuum.alfred', 'error') }}

                Extra information regarding different errors:
                - Error description: None means no error description or no error.
                - Device Stuck, clean area: the device is stuck, the area around the robot needs to be cleared.
                - Wheels on top of void, move robot: the robot's wheels are suspended and needs to be moved.

                Mention the floor and the name, say it is in error, clearly describe the type of error if available,
                and be brief, around 150 characters. One friendly sentence is enough. Add a relevant emoji.
      - service: notify.sander_and_tamara_phones
        continue_on_error: true
        data:
          title: "Error with {{ trigger.id }}"
          message: "{{ gpt_vacuum_error_response.response.speech.plain.speech }}"
          data:
            ttl: 0
            priority: high
            sticky: "true"
            group: vacuum
            tag: vacuumerror
            notification_icon: mdi:robot-vacuum
            image: "/api/{{ map_type }}_proxy/{{ map_entity_id }}"
      - service: scene.create
        data:
          scene_id: atmoorb_bulbs_before
          snapshot_entities:
            - light.atmoorb_left
            - light.atmoorb_right
      - service: light.turn_on
        target:
          entity_id:
            - light.atmoorb_left
            - light.atmoorb_right
        data:
          rgb_color: [255, 0, 0]
          effect: "Fast Pulse"
      - wait_template: >-
          {% if trigger.id == 'Dustin' %}
            {{ states('sensor.dustin_error') in ['no_error', 'clean_mop_pad', 'unavailable']
               or not is_state('vacuum.dustin', 'error') }}
          {% elif trigger.id == 'Moeke' %}
            {{ states('sensor.moeke_error') in ['no_error', 'clean_mop_pad', 'unavailable']
               or not is_state('vacuum.moeke', 'error') }}
          {% else %}
            {{ not is_state('vacuum.alfred', 'error') and not is_state('vacuum.alfred', 'paused') }}
          {% endif %}
      - service: scene.turn_on
        data:
          entity_id: scene.atmoorb_bulbs_before
          transition: 1
      - service: notify.sander_and_tamara_phones
        data:
          message: "clear_notification"
          data:
            ttl: 0
            priority: high
            tag: vacuumerror

  - alias: "[home|vacuum] Notify if Moeke clean water reservoir is empty"
    id: home_vacuum_notify_if_moeke_clean_water_reservoir_is_empty
    description: >
      Keeps the existing Moeke water reservoir notification workflow. This stays
      with Moeke because the leak sensor physically moves with that vacuum.
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.moeke_error
        to:
          - clean_tank_level
          - dirty_tank_level
        for:
          minutes: 5
      - platform: state
        entity_id: binary_sensor.moeke_reservoir_leak_sensor
        to: "off"
        for:
          minutes: 5
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ trigger.entity_id == 'sensor.moeke_error'
                     and trigger.to_state.state == 'dirty_tank_level' }}
            sequence:
              - service: notify.sander_and_tamara_phones
                continue_on_error: true
                data:
                  title: "Moeke: dirty water tank full"
                  message: "Please empty the dirty water tank on the auto-empty dock."
                  data:
                    ttl: 0
                    priority: high
                    group: vacuum
                    tag: vacuumerror
                    notification_icon: mdi:robot-vacuum
          - conditions:
              - condition: or
                conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.entity_id == 'binary_sensor.moeke_reservoir_leak_sensor'
                         and trigger.to_state.state == 'off' }}
                  - condition: template
                    value_template: >-
                      {{ trigger.entity_id == 'sensor.moeke_error'
                         and trigger.to_state.state == 'clean_tank_level' }}
            sequence:
              - service: notify.sander_and_tamara_phones
                continue_on_error: true
                data:
                  title: "Moeke: clean water tank empty"
                  message: "Please refill the clean water tank on the auto-empty dock."
                  data:
                    ttl: 0
                    priority: high
                    group: vacuum
                    tag: vacuumerror
                    notification_icon: mdi:robot-vacuum
      - service: scene.create
        data:
          scene_id: atmoorb_right_bulb_before
          snapshot_entities:
            - light.atmoorb_right
      - service: light.turn_on
        target:
          entity_id:
            - light.atmoorb_right
        data:
          rgb_color: [70, 70, 255]
          effect: Fast Pulse
      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.moeke_reservoir_leak_sensor
            to: "on"
            for:
              seconds: 30
          - platform: state
            entity_id: sensor.moeke_error
            not_to:
              - clean_tank_level
              - dirty_tank_level
            for:
              seconds: 30
      - service: button.press
        continue_on_error: true
        target:
          entity_id: button.moeke_clear_warning
      - service: scene.turn_on
        data:
          entity_id: scene.atmoorb_right_bulb_before
          transition: 1
      - service: notify.sander_and_tamara_phones
        data:
          message: "clear_notification"
          data:
            ttl: 0
            priority: high
            tag: vacuumerror

  - alias: "[home|vacuum] Reset Dustin utility meter on sudden area jump"
    id: yaml_automation_home_vacuum_reset_dustin_utility_meter_on_sudden_area_jump
    description: >
      Resets Dustin's daily cleaned-area utility meter when a sudden jump occurs
      while Dustin is not cleaning.
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.dustin_area_cleaned_today
    condition:
      - condition: template
        value_template: >-
          {% set old = trigger.from_state.state | float(0) %}
          {% set new = trigger.to_state.state | float(0) %}
          {{ (new - old) > 10 }}
      - condition: template
        value_template: "{{ not is_state('vacuum.dustin', 'cleaning') }}"
      - condition: state
        entity_id: vacuum.dustin
        state:
          - "docked"
          - "paused"
          - "idle"
    action:
      - service: utility_meter.calibrate
        target:
          entity_id: sensor.dustin_area_cleaned_today
        data:
          value: "0"
      - service: system_log.write
        data:
          level: info
          message: >-
            Reset dustin_area_cleaned_today due to sudden jump from
            {{ trigger.from_state.state }} to {{ trigger.to_state.state }} m².

  - alias: "[home|vacuum] Reset Moeke utility meter on sudden area jump"
    id: home_vacuum_reset_utility_meter_on_sudden_area_jump
    description: >
      Resets Moeke's daily cleaned-area utility meter when a sudden jump occurs
      while Moeke is not cleaning.
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.moeke_area_cleaned_today
    condition:
      - condition: template
        value_template: >-
          {% set old = trigger.from_state.state | float(0) %}
          {% set new = trigger.to_state.state | float(0) %}
          {{ (new - old) > 10 }}
      - condition: template
        value_template: "{{ not is_state('vacuum.moeke', 'cleaning') }}"
      - condition: state
        entity_id: vacuum.moeke
        state:
          - "docked"
          - "paused"
          - "idle"
    action:
      - service: utility_meter.calibrate
        target:
          entity_id: sensor.moeke_area_cleaned_today
        data:
          value: "0"
      - service: system_log.write
        data:
          level: info
          message: >-
            Reset moeke_area_cleaned_today due to sudden jump from
            {{ trigger.from_state.state }} to {{ trigger.to_state.state }} m².

  - alias: "[home|vacuum] Moeke detergent low warning and reset option"
    id: yaml_automation_home_vacuum_moeke_detergent_low_warning_and_reset_option
    description: >
      Warns when Moeke detergent is low and offers a mobile action to reset the
      detergent level after refill.
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.moeke_detergent_left
        below: 60
    action:
      - variables:
          notification_tag: moeke_detergent_warning
      - service: notify.sander_and_tamara_phones
        data:
          title: "Moeke: Detergent almost empty"
          message: >-
            The detergent level is below 60% and is currently at
            {{ states('sensor.moeke_detergent_left') }}%. Do you want to reset it now?
          data:
            ttl: 0
            priority: high
            sticky: "true"
            tag: "{{ notification_tag }}"
            actions:
              - action: RESET_MOEKE_DETERGENT
                title: "✅ Reset detergent level"
              - action: CANCEL_MOEKE_DETERGENT
                title: "❌ Cancel"
      - wait_for_trigger:
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: RESET_MOEKE_DETERGENT
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: CANCEL_MOEKE_DETERGENT
        continue_on_timeout: false
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ wait.trigger.event.data.action == 'RESET_MOEKE_DETERGENT' }}"
            sequence:
              - service: button.press
                target:
                  entity_id: button.moeke_reset_detergent
              - delay:
                  seconds: 10
              - service: notify.sander_and_tamara_phones
                data:
                  title: "Detergent level reset"
                  message: >-
                    The detergent level has been reset. Currently at
                    {{ states('sensor.moeke_detergent_left') }}%.
                  data:
                    sticky: "true"
                    tag: "{{ notification_tag }}"
      - service: notify.sander_and_tamara_phones
        data:
          message: "clear_notification"
          data:
            ttl: 0
            priority: high
            tag: "{{ notification_tag }}"

