#####################
#    AUTOMATIONS    #
#####################
automation:
  - alias: "[afval|notify] Dismiss sticky garbage notification when acknowledged"
    id: yaml_automation_afval_notify_dismiss_sticky_garbage_notification_when_acknowledged
    description: >-
      Clears the matching sticky garbage notification and stores the exact
      acknowledged pickup key, so consecutive pickup days do not block each other.
    mode: queued
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: GARBAGE_TODAY_PUT_OUT
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: GARBAGE_TOMORROW_PUT_OUT
    variables:
      today_waste: >-
        {{ states('sensor.afval_voor_today') | lower | trim }}
      tomorrow_waste: >-
        {{ states('sensor.afval_voor_tomorrow') | lower | trim }}
      today_pickup_key: >-
        {{ today_at().strftime('%Y-%m-%d') ~ '|' ~ today_waste }}
      tomorrow_pickup_key: >-
        {{ (today_at() + timedelta(days=1)).strftime('%Y-%m-%d') ~ '|' ~ tomorrow_waste }}
      acknowledged_pickup_key: >-
        {%- if trigger.event.data.action == 'GARBAGE_TODAY_PUT_OUT' -%}
          {{ today_pickup_key }}
        {%- else -%}
          {{ tomorrow_pickup_key }}
        {%- endif -%}
      notification_tag: >-
        {%- if trigger.event.data.action == 'GARBAGE_TODAY_PUT_OUT' -%}
          garbage_pickup_today
        {%- else -%}
          garbage_pickup_tomorrow
        {%- endif -%}
    action:
      - service: notify.sander_and_tamara_phones
        data:
          message: clear_notification
          data:
            ttl: 0
            priority: high
            tag: "{{ notification_tag }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.garbage_acknowledged_pickup_key
        data:
          value: "{{ acknowledged_pickup_key }}"

  - alias: "[afval|notify] Herinnering afval morgen"
    id: yaml_automation_afval_notify_herinnering_afval_morgen
    description: >-
      Sends a sticky reminder the evening before pickup unless that exact pickup
      was already acknowledged.
    mode: single
    trigger:
      - platform: time
        at: "19:00:00"
    variables:
      tomorrow_waste: >-
        {{ states('sensor.afval_voor_tomorrow') | lower | trim }}
      tomorrow_pickup_key: >-
        {{ (today_at() + timedelta(days=1)).strftime('%Y-%m-%d') ~ '|' ~ tomorrow_waste }}
    condition:
      - condition: template
        value_template: >-
          {{ states('sensor.afval_voor_tomorrow') not in ['None', 'none', 'unknown', 'unavailable', ''] }}
      - condition: template
        value_template: >-
          {{ states('input_text.garbage_acknowledged_pickup_key') != tomorrow_pickup_key }}
    action:
      - service: notify.sander_and_tamara_phones
        data:
          title: Afval morgen
          message: "Afval: {{ states('sensor.afval_voor_tomorrow') }}"
          data:
            sticky: true
            ttl: 0
            priority: high
            tag: garbage_pickup_tomorrow
            group: garbage
            channel: Garbage
            notification_icon: mdi:trash-can-outline
            actions:
              - action: GARBAGE_TOMORROW_PUT_OUT
                title: I put it outside

  - alias: "[afval|notify] Herinnering afval vandaag"
    id: yaml_automation_afval_notify_herinnering_afval_vandaag
    description: >-
      Sends a sticky notification on the morning of pickup unless that exact
      pickup was already acknowledged.
    mode: single
    trigger:
      - platform: time
        at: "07:00:00"
      - platform: state
        entity_id: input_boolean.sleep_tracking_on
        to: "off"
        for: "00:10:00"
    variables:
      today_waste: >-
        {{ states('sensor.afval_voor_today') | lower | trim }}
      today_pickup_key: >-
        {{ today_at().strftime('%Y-%m-%d') ~ '|' ~ today_waste }}
    condition:
      - condition: template
        value_template: >-
          {{ states('sensor.afval_voor_today') not in ['None', 'none', 'unknown', 'unavailable', ''] }}
      - condition: template
        value_template: >-
          {{ states('input_text.garbage_acknowledged_pickup_key') != today_pickup_key }}
    action:
      - service: notify.sander_and_tamara_phones
        data:
          title: Afval vandaag
          message: "Afval voor: {{ states('sensor.afval_voor_today') }}"
          data:
            sticky: true
            ttl: 0
            priority: high
            tag: garbage_pickup_today
            group: garbage
            channel: Garbage
            notification_icon: mdi:trash-can-outline
            actions:
              - action: GARBAGE_TODAY_PUT_OUT
                title: I put it outside

