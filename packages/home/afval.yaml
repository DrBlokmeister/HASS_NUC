template:
  - sensor:
      - name: "Days to GFT"
        unique_id: yaml_template_sensor_days_to_gft
        icon: mdi:leaf
        unit_of_measurement: days
        state: >-
          {{ (strptime(states('sensor.afval_voor_gft'), '%d-%m-%Y', today_at()) | as_local - today_at()).days }}
        availability: >-
          {{ states('sensor.afval_voor_gft') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

      - name: "Days to Papier"
        unique_id: yaml_template_sensor_days_to_papier
        icon: mdi:newspaper-variant
        unit_of_measurement: days
        state: >-
          {{ (strptime(states('sensor.afval_voor_papier'), '%d-%m-%Y', today_at()) | as_local - today_at()).days }}
        availability: >-
          {{ states('sensor.afval_voor_papier') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

      - name: "Days to Restafval"
        unique_id: yaml_template_sensor_days_to_restafval
        icon: mdi:delete
        unit_of_measurement: days
        state: >-
          {{ (strptime(states('sensor.afval_voor_restafval'), '%d-%m-%Y', today_at()) | as_local - today_at()).days }}
        availability: >-
          {{ states('sensor.afval_voor_restafval') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

