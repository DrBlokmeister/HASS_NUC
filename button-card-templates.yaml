      - border-radius: 10px
      - background: rgba(var(--rgb-card-background-color), 0.65)
      - border: 1px solid rgba(255,255,255,0.08)
      - box-shadow: none
      - min-height: 76px

    name:
      - font-size: 0.72em
      - font-weight: 700
      - justify-self: center
      - color: var(--secondary-text-color)

    custom_fields:
      port:
        - justify-self: center
        - align-self: center

  extra_styles: |
    .port {
      position: relative;
      width: 46px;
      height: 36px;
      border-radius: 5px 5px 8px 8px;
      border: 2px solid rgba(120,120,120,0.45);
      background:
        linear-gradient(180deg, rgba(20,20,20,0.95), rgba(55,55,55,0.75));
